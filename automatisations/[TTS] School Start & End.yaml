alias: "[TTS] School Start & End"
description: Play TTS reminders for school start and end times
triggers:
  - entity_id:
      - input_boolean.bouton_test
    trigger: state
    id: test_random
  - alias: 10 Min Before School Start
    id: start_10min
    trigger: time
              # Construction du message complet avec heure ajoutée ici
              message: "Il est {{ time }}. {{ fact_result.fun_fact }}"
    at: >-
      {{ (today_at(states('input_datetime.school_start_today')) -
                value_template: "{{ not (fact_result is mapping and 'fun_fact' in fact_result) }}"
  - alias: 5 Min Before School Start
    id: start_5min
                  message: "Il est {{ time }}. (Fun fact indisponible)"
    at: >-
              - variables: {}
  - alias: Timer Before School Start
    id: start_timer
    trigger: time
    at: |-
      {{ (strptime(states('input_datetime.school_start_today'), '%H:%M:%S') -
          strptime(states('input_datetime.school_start_timer'), '%H:%M:%S')).strftime('%H:%M:%S') }}
  - alias: 10 Min Before School End
    id: end_10min
    trigger: time
    at: >-
      {{ (today_at(states('input_datetime.school_end_today')) -
      timedelta(minutes=10)).strftime('%H:%M:%S') }}
  - alias: 5 Min Before School End
    id: end_5min
    trigger: time
    at: >-
      {{ (today_at(states('input_datetime.school_end_today')) -
      timedelta(minutes=5)).strftime('%H:%M:%S') }}
  - alias: Timer Before School End
    id: end_timer
    trigger: time
    at: |-
      {{ (strptime(states('input_datetime.school_end_today'), '%H:%M:%S') -
          strptime(states('input_datetime.school_end_timer'), '%H:%M:%S')).strftime('%H:%M:%S') }}
conditions:
  - condition: state
    entity_id: input_boolean.school
    state: "on"
  - condition: state
    entity_id: group.persons
    state: home
actions:
  - variables:
      time: "{{ now().strftime('%H:%M') }}"
      sncf: >-
        {{ 'start' in (random_test_id if trigger.id == 'test_random' else
        trigger.id) }}
      random_test_id: >-
        {{ ['start_timer', 'start_10min', 'start_5min'] | random if trigger.id
        == 'test_random' else trigger.id }}
      message: >-
        {% set facts_timer = [
          "Il est " ~ time ~ ". Eliott, sais-tu qu'une voiture de Formule 1 colle à la piste grâce à son aileron ?",
          "Il est " ~ time ~ ". Eliott, sais-tu que la lumière du Soleil met environ 8 minutes pour arriver jusqu'à nous.",
          "Il est " ~ time ~ ". Eliott, sais-tu que ton cœur bat environ 100 000 fois par jour.",
          "Il est " ~ time ~ ". Eliott, sais-tu que certaines fourmis cultivent des champignons comme des petits jardiniers.",
          "Il est " ~ time ~ ". Eliott, sais-tu qu'un arc-en-ciel complet forme un cercle mais on n'en voit que la moitié.",
          "Il est " ~ time ~ ". Eliott, sais-tu qu'un bébé girafe marche moins d'une heure après sa naissance.",
          "Il est " ~ time ~ ". Eliott, sais-tu que les abeilles dansent pour montrer où sont les fleurs.",
          "Il est " ~ time ~ ". Eliott, sais-tu que l'eau recouvre environ 70 % de la Terre.",
          "Il est " ~ time ~ ". Eliott, sais-tu que se laver les mains pendant 20 secondes chasse la plupart des microbes.",
          "Il est " ~ time ~ ". Eliott, sais-tu que ta peau est ton plus grand organe, elle te protège comme un bouclier.",
          "Il est " ~ time ~ ". Eliott, sais-tu qu'une coccinelle mange des dizaines de pucerons chaque jour.",
          "Il est " ~ time ~ ". Eliott, sais-tu que la Voie lactée contient des centaines de milliards d'étoiles.",
          "Il est " ~ time ~ ". Eliott, sais-tu que les requins n'ont pas d'os, seulement du cartilage (comme ton oreille).",
          "Il est " ~ time ~ ". Eliott, sais-tu que boire un verre d'eau aide ton cerveau à bien démarrer la journée.",
          "Il est " ~ time ~ ". Eliott, sais-tu qu'un nuage peut peser plusieurs tonnes tout en restant dans l'air.",
          "Il est " ~ time ~ ". Eliott, sais-tu qu'un moteur électrique donne son couple maximal dès 0 tour par minute.",
          "Il est " ~ time ~ ". Eliott, sais-tu que les plantes fabriquent l'oxygène que tu respires grâce à la lumière.",
          "Il est " ~ time ~ ". Eliott, sais-tu que ton squelette a plus de 200 os qui grandissent encore.",
          "Il est " ~ time ~ ". Eliott, sais-tu que la Lune fait bouger certaines marées en tirant sur l'océan.",
          "Il est " ~ time ~ ". Eliott, sais-tu que les volcans transforment les roches, ils les font fondre puis refroidir.",
          "Il est " ~ time ~ ". Eliott, sais-tu qu'un avion de ligne vole à environ 10 kilomètres au-dessus de la Terre.",
          "Il est " ~ time ~ ". Eliott, sais-tu qu'en service le TGV roule jusqu'à 320 km/h et son record d'essai est de 574,8 km/h.",
          "Il est " ~ time ~ ". Eliott, sais-tu que la Bugatti Bolide va à 501 km/h, vitesse record en 2025.",
          "Il est " ~ time ~ ". Eliott, sais-tu que le Soleil est une étoile moyenne parmi des milliards, il n'est ni le plus grand ni le plus petit.",
          "Il est " ~ time ~ ". Eliott, sais-tu que les plantes utilisent la lumière pour fabriquer leur nourriture et nous donner de l'air."
        ] %} {% set facts_10 = [
          "Il est " ~ time ~ ". Eliott, tu savais que la Bugatti Chiron dépasse 400 km/h, plus vite qu'un avion au décollage.",
          "Il est " ~ time ~ ". Eliott, tu savais que la lumière d'une étoile lointaine voyage parfois des millions d'années jusqu'à tes yeux.",
          "Il est " ~ time ~ ". Eliott, tu savais que les pieuvres ont trois cœurs et du sang bleu.",
          "Il est " ~ time ~ ". Eliott, tu savais qu'un cerveau détendu apprend plus vite qu'un cerveau stressé.",
          "Il est " ~ time ~ ". Eliott, tu savais que respirer profondément donne de l'énergie à tes muscles.",
          "Il est " ~ time ~ ". Eliott, tu savais que tes dents sont plus dures que tes os.",
          "Il est " ~ time ~ ". Eliott, tu savais qu'un scarabée rhinocéros peut porter des charges énormes pour son poids.",
          "Il est " ~ time ~ ". Eliott, tu savais que chaque flocon de neige a une forme unique.",
          "Il est " ~ time ~ ". Eliott, tu savais que certaines voitures récupèrent l'énergie du freinage.",
          "Il est " ~ time ~ ". Eliott, tu savais que les satellites restent en orbite en tombant sans toucher la Terre.",
          "Il est " ~ time ~ ". Eliott, tu savais qu'une cellule sanguine met moins d'une minute pour faire un tour complet du corps."
        ] %} {% set facts_5 = [
          "Il est " ~ time ~ ". Eliott, est ce que tu savais que faire du vélo renforce ton cœur.",
          "Il est " ~ time ~ ". Eliott, est ce que tu savais qu'un papillon goûte avec ses pattes.",
          "Il est " ~ time ~ ". Eliott, est ce que tu savais que la foudre est plus chaude que la surface du Soleil.",
          "Il est " ~ time ~ ". Eliott, est ce que tu savais que les koalas dorment presque 20 heures par jour.",
          "Il est " ~ time ~ ". Eliott, est ce que tu savais que l'air que tu respires contient surtout de l'azote.",
          "Il est " ~ time ~ ". Eliott, est ce que tu savais que sourire aide ton cerveau à libérer des hormones de bien-être.",
          "Il est " ~ time ~ ". Eliott, est ce que tu savais que la première voiture à essence roulait moins vite qu'un enfant qui court.",
          "Il est " ~ time ~ ". Eliott, est ce que tu savais que boire un verre d'eau le matin réveille ton corps en douceur.",
          "Il est " ~ time ~ ". Eliott, est ce que tu savais qu'une graine peut rester endormie des années avant de pousser.",
          "Il est " ~ time ~ ". Eliott, est ce que tu savais que le TGV peut atteindre 320 km/h en service (record 574,8 km/h).",
          "Il est " ~ time ~ ". Eliott, est ce que tu savais que l'énergie solaire en une heure dépasse la consommation humaine d'une année.",
          "Il est " ~ time ~ ". Eliott, est ce que tu savais que le sang transporte l'oxygène grâce à l'hémoglobine qui contient du fer.",
          "Il est " ~ time ~ ". Eliott, est ce que tu savais que le Sahara s'étend sur plus de 9 millions de km²."
        ] %} {# Rotation quotidienne déterministe avec offsets pour varier selon
        le type de déclencheur #} {% set day = now().timetuple().tm_yday %} {%
        set idx_timer = day % (facts_timer|length) %} {% set idx_10 = (day + 1)
        % (facts_10|length) %} {% set idx_5 = (day + 2) % (facts_5|length) %}

        {% set trigger_to_use = random_test_id %} {% if trigger_to_use ==
        'start_timer' %}
          {{ facts_timer[idx_timer] }}
        {% elif trigger_to_use == 'start_10min' %}
          {{ facts_10[idx_10] }}
        {% elif trigger_to_use == 'start_5min' %}
          {{ facts_5[idx_5] }}
        {% elif trigger_to_use == 'end_timer' %}
          {{ "Il est " ~ time ~ ". Il faut aller chercher Eliott tout de suite." }}
        {% elif trigger_to_use == 'end_5min' %}
          {{ "Il est " ~ time ~ ". Il faut partir maintenant pour être à l'heure." }}
        {% elif trigger_to_use == 'end_10min' %}
          {{ "Il est " ~ time ~ ". Prépare-toi à partir chercher Eliott." }}
        {% else %}
          {{ "Il est " ~ time ~ ". C'est l'heure pour Eliott." }}
        {% endif %}
  - alias: Send TTS message
    action: script.tts_send_tts
    data:
      media_player: media_player.ni_oscar_ni_parents
      message: "{{ message }}"
      sncf: "{{ sncf }}"
mode: single
