alias: "[Lights] Adjust Living Room Brightness & Temperature if lights On"
sequence:
  - variables:
      light_entity_ids:
        - light.ikea_tradfri_e27_1055lm_2
        - light.enki_lexman_e27_led_white_bulb_kitchen
        - light.yeelight_ct_bulb
        - light.enki_lexman_e27_led_white_bulb_living_room
        - light.yeelight_stripe_local
        - light.ptitlampe
      brightness_pct: "{{ states('input_number.now_light_lumi_salon') | int }}"
      brightness_value: "{{ ((brightness_pct / 100 * 255) | int) }}"
      brightness_min: "{{ brightness_value - 5 }}"
      brightness_max: "{{ brightness_value + 5 }}"
      kelvin_value: "{{ states('input_number.now_light_temp_salon') | int }}"
      lights_on: >-
        {{ states.light | selectattr('state', 'eq', 'on') |
        selectattr('entity_id', 'in', light_entity_ids) |
        map(attribute='entity_id') | list }}
  - condition: "{{ lights_on | count > 0 }}"
  - repeat:
      while:
        - condition: template
          value_template: "{{ (repeat.index - 1) < lights_on | count }}"
      sequence:
        - variables:
            entity_id: "{{ lights_on[repeat.index - 1] }}"
        - condition: template
          value_template: |-
            {{ state_attr(entity_id, 'brightness') <= brightness_min or
               state_attr(entity_id, 'brightness') >= brightness_max }}
          enabled: false
        - target:
            entity_id: "{{ entity_id }}"
          data_template:
            brightness_pct: "{{ brightness_pct }}"
            color_temp_kelvin: "{{ kelvin_value }}"
          action: light.turn_on
        - data:
            title: "[Lights] Adjust Bed Room Brightness & Temperature if lights On"
            message: >-
              lights_on: {{ lights_on }} --- , entity_id : {{ entity_id }} ---
              ,   brightness: {{state_attr(entity_id,'brightness') }},
              brightness_now: {{ brightness_value }},
          enabled: false
          action: notify.persistent_notification
mode: single
icon: mdi:sofa-outline
