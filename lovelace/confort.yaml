sections:
  - icon: mdi:weather-windy
    cards:
      - type: heading
        heading: 🌬️ Ventilation
        heading_style: title
      - show_name: true
        show_icon: true
        show_state: true
        type: glance
        title: 🌡️ Températures
        columns: 3
        state_color: true
        entities:
          - entity: input_number.temp_reference_aeration
            name: Ouverture
          - entity: input_number.temp_min_aeration
            name: Minimale
          - entity: sensor.temperatures_maison
            name: Actuelle
        card_mod:
          style:
            div.entity:
              $: |
                div {
                  display: flex !important;
                  flex-direction: column !important;
                  align-items: center !important;
                }
                span.state {
                  font-size: 14px !important;
                  font-weight: bold !important;
                  margin-top: 4px !important;
                  display: block !important;
                }
            .: >
              {% macro get_time(entity_id) -%}
                {%- set t = (now() - as_local(states[entity_id].last_changed | default(now()))).total_seconds() -%}
                {%- if t < 60 -%}Maintenant
                {%- elif t < 3600 -%}{{ (t / 60) | int }} min
                {%- elif t < 86400 -%}{{ (t / 3600) | int }} h
                {%- else -%}{{ (t / 86400) | int }} j
                {%- endif -%}
              {%- endmacro %} div.entity:nth-child(1)::after { content: "{{
              get_time('input_number.temp_reference_aeration') | trim }}"; }
              div.entity:nth-child(2)::after { content: "{{
              get_time('input_number.temp_min_aeration') | trim }}"; }
              div.entity:nth-child(3)::after { content: "{{
              get_time('sensor.temperatures_maison') | trim }}"; }
              div.entity::after { font-size: 10px; color:
              var(--secondary-text-color); display: block; text-align: center;
              margin-top: 2px; }
      - show_name: true
        show_icon: true
        show_state: true
        type: glance
        title: 💧 Humidités
        columns: 3
        state_color: true
        entities:
          - entity: input_number.humid_reference_aeration
            name: Ouverture
            icon: mdi:home-percent-outline
          - entity: input_number.humid_min_aeration
            name: Minimale
            icon: mdi:cloud-percent-outline
          - entity: sensor.humidite_maison
            name: Actuelle
        card_mod:
          style:
            div.entity:
              $: |
                div {
                  display: flex !important;
                  flex-direction: column !important;
                  align-items: center !important;
                }
                span.state {
                  font-size: 14px !important;
                  font-weight: bold !important;
                  margin-top: 4px !important;
                  display: block !important;
                }
            .: >
              {% macro get_time(entity_id) -%}
                {%- set t = (now() - as_local(states[entity_id].last_changed | default(now()))).total_seconds() -%}
                {%- if t < 60 -%}Maintenant
                {%- elif t < 3600 -%}{{ (t / 60) | int }} min
                {%- elif t < 86400 -%}{{ (t / 3600) | int }} h
                {%- else -%}{{ (t / 86400) | int }} j
                {%- endif -%}
              {%- endmacro %} div.entity:nth-child(1)::after { content: "{{
              get_time('input_number.humid_reference_aeration') | trim }}"; }
              div.entity:nth-child(2)::after { content: "{{
              get_time('input_number.humid_min_aeration') | trim }}"; }
              div.entity:nth-child(3)::after { content: "{{
              get_time('sensor.humidite_maison') | trim }}"; } div.entity::after
              { font-size: 10px; color: var(--secondary-text-color); display:
              block; text-align: center; margin-top: 2px; }
      - show_name: true
        show_icon: true
        show_state: true
        type: glance
        columns: 2
        state_color: true
        entities:
          - entity: input_boolean.aeration_active
            name: Active
          - entity: binary_sensor.fenetres_maison
            name: Fenêtres
        theme: macOS Theme
        card_mod:
          style:
            div.entity:
              $: |
                div {
                  display: flex !important;
                  flex-direction: column !important;
                  align-items: center !important;
                }
                span.state {
                  font-size: 14px !important;
                  font-weight: bold !important;
                  margin-top: 4px !important;
                  display: block !important;
                }
            .: |
              div.entity:nth-child(1)::after {
                content: "{% set t = (now() - as_local(states.input_boolean.aeration_active.last_changed | default(now()))).total_seconds() %}{% if t < 60 %}Maintenant{% elif t < 3600 %}{{ (t / 60) | int }} min{% elif t < 86400 %}{{ (t / 3600) | int }} h{% else %}{{ (t / 86400) | int }} j{% endif %}";
                font-size: 10px; color: var(--secondary-text-color); display: block; text-align: center; margin-top: 2px;
              }
              div.entity:nth-child(2)::after {
                content: "{% set t = (now() - as_local(states.binary_sensor.fenetres_maison.last_changed | default(now()))).total_seconds() %}{% if t < 60 %}Maintenant{% elif t < 3600 %}{{ (t / 60) | int }} min{% elif t < 86400 %}{{ (t / 3600) | int }} h{% else %}{{ (t / 86400) | int }} j{% endif %}";
                font-size: 10px; color: var(--secondary-text-color); display: block; text-align: center; margin-top: 2px;
              }
