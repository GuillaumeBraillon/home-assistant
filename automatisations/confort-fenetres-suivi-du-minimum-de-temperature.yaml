alias: "[Confort] Fenêtres - Suivi du minimum de température"
description: >-
  Met à jour le minimum atteint depuis l'ouverture des fenêtres. Permet de
  détecter une remontée par rapport au point le plus bas.
triggers:
  - trigger: state
    entity_id: sensor.temperatures_maison
conditions:
  - alias: Au moins une fenêtre ouverte
    condition: template
    value_template: |-
      {{ is_state('binary_sensor.magnet_oscar_contact', 'on') or
         is_state('binary_sensor.magnet_eliott_contact', 'on') or
         is_state('binary_sensor.magnet_parents_contact', 'on') or
         is_state('binary_sensor.magnet_living_room_left_contact', 'on') }}
  - alias: Une session d'aération est en cours (référence initialisée)
    condition: template
    value_template: "{{ states('input_number.temp_min_aeration') | float(0) > 0 }}"
  - alias: La température actuelle est inférieure au minimum enregistré
    condition: template
    value_template: "{{ states('sensor.temperatures_maison') | float(99) < states('input_number.temp_min_aeration') | float(99) }}"
actions:
  - action: input_number.set_value
    target:
      entity_id: input_number.temp_min_aeration
    data:
      value: "{{ ((states('sensor.temperatures_maison') | float(0) * 10) | int / 10) | round(1) }}"
mode: single
max_exceeded: silent
