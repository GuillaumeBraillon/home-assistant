alias: "[Lights] Cuisine"
description: ""
triggers:
  - entity_id:
      - binary_sensor.motion_kitchen_occupancy
      - input_boolean.mode_auto_cuisine
    to:
      - "on"
    trigger: state
  - entity_id:
      - input_select.modes_maison
    from: Nuit
    trigger: state
conditions:
  - condition: state
    entity_id: input_boolean.mode_auto_cuisine
    state: "on"
  - condition: state
    entity_id: binary_sensor.motion_kitchen_occupancy
    state: "on"
    enabled: true
actions:
  - alias: "Not Soirée TV  turn on lights "
    if:
      - condition: template
        value_template: "{{ not is_state('input_select.modes_maison', 'Soirée TV') }}"
        alias: Not 'Soirée TV'
      - condition: numeric_state
        entity_id: sensor.motion_kitchen_illuminance
        below: 80
    then:
      - alias: Turn on Console
        data: {}
        target:
          entity_id:
            - light.yeelight_ct_bulb
            - light.ptitlampe
        action: light.turn_on
      - alias: " Not 'Nuit' Turn on Plafonnier"
        if:
          - condition: template
            value_template: "{{ not is_state('input_select.modes_maison', 'Nuit') }}"
            alias: Not 'Nuit'
        then:
          - alias: Turn on Plafonnier
            data: {}
            target:
              entity_id: light.enki_lexman_e27_led_white_bulb_kitchen
            action: light.turn_on
  - if:
      - condition: or
        conditions:
          - condition: state
            entity_id: input_select.modes_maison
            state: Soir
          - condition: state
            entity_id: input_select.modes_maison
            state: Soirée TV
    then:
      - data: {}
        target:
          entity_id: input_boolean.mode_auto_cuisine
        action: input_boolean.turn_off
      - stop: Mode Auto Cuisine OFF
    alias: Mode soir ou soirée TV mode auto cuisine off
  - wait_template: "{{ is_state('binary_sensor.motion_kitchen_occupancy', 'off') }}"
    continue_on_timeout: false
    enabled: true
  - delay:
      hours: 0
      minutes: "{{ states('input_number.now_light_delay_off')|int}}"
      seconds: 0
      milliseconds: 0
    alias: Wait the number of seconds that has been set
  - if:
      - condition: state
        entity_id: input_boolean.mode_auto_cuisine
        state: "on"
    then:
      - alias: Turn off the light
        data: {}
        target:
          entity_id:
            - light.yeelight_ct_bulb
            - light.enki_lexman_e27_led_white_bulb_kitchen
            - light.ptitlampe
        action: light.turn_off
mode: restart
