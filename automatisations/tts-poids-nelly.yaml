alias: "[TTS] Poids Nelly IA"
description: >-
  Annonce TTS et notification mobile lors d’une nouvelle mesure de poids de
  Nelly, historise min/max/diff, et génère un texte motivant via IA.
triggers:
  - entity_id: sensor.poids_nelly
    trigger: state
    enabled: true
conditions:
  - condition: template
    value_template: >-
      {{
        trigger.to_state is not none
        and trigger.to_state.state not in ['unknown', 'unavailable', none, 'None', '']
        and (trigger.to_state.state | float(0)) > 0
      }}
    enabled: true
  - condition: template
    value_template: >-
      {{
        trigger.from_state is not none
        and trigger.from_state.state not in ['unknown', 'unavailable', none, 'None', '']
      }}
    enabled: true
actions:
  - variables:
      poids_actuel: "{{ trigger.to_state.state | float }}"
      poids_precedent: "{{ trigger.from_state.state | float }}"
      poids_difference: "{{ (poids_actuel - poids_precedent) | round(2) }}"
      poids_min: "{{ states('input_number.poids_nelly_min') | float }}"
      poids_max: "{{ states('input_number.poids_nelly_max') | float }}"
      perte_nelly: "{{ states('sensor.poids_nelly_perte') | float }}"
      prise_nelly: "{{ states('sensor.poids_nelly_prise') | float }}"
      imc: "{{ (poids_actuel / (1.80 * 1.80)) | round(1) }}"
      tendance: >-
        {% if poids_difference < -0.01 %}baisse{% elif poids_difference > 0.01
        %}hausse{% else %}stable{% endif %}
  - data:
      entity_id: input_number.poids_nelly_difference
      value: "{{ poids_difference }}"
    action: input_number.set_value
    enabled: true
  - alias: Mise à jour du Poids Min / Max
    choose:
      - conditions:
          - condition: template
            value_template: "{{ poids_actuel > poids_max }}"
        sequence:
          - data:
              entity_id: input_number.poids_nelly_max
              value: "{{ poids_actuel }}"
            action: input_number.set_value
      - conditions:
          - condition: template
            value_template: "{{ poids_actuel < poids_min }}"
        sequence:
          - data:
              entity_id: input_number.poids_nelly_min
              value: "{{ poids_actuel }}"
            action: input_number.set_value
    enabled: true
  - variables:
      poids_min_effectif: "{{ [poids_actuel, poids_min] | min }}"
      poids_max_effectif: "{{ [poids_actuel, poids_max] | max }}"
      variation_label: >-
        {% if poids_difference > 0 %}
          +{{ poids_difference }}
        {% else %}
          {{ poids_difference }}
        {% endif %}
  - alias: SQL GET HISTO 10 LAST
    action: sql.query
    metadata: {}
    data:
      query: |-
        SELECT
            COUNT(*) as nb_mesures,
            ROUND(AVG((t1.min + t1.max) / 2), 1) as poids_moyen,
            ROUND(MIN(t1.min), 1) as poids_min,
            ROUND(MAX(t1.max), 1) as poids_max,
            ROUND(MAX(t1.max) - MIN(t1.min), 1) as amplitude
        FROM (
            SELECT *
            FROM statistics AS t1
            INNER JOIN statistics_meta AS t2 ON t1.metadata_id = t2.id
            WHERE
                t2.statistic_id = 'sensor.poids_nelly'
                AND t1.min != t1.max
            ORDER BY t1.start_ts DESC
            LIMIT 10
        ) as t1;
    response_variable: result_statistics
  - variables:
      stats_poids: >-
        {%- set data = result_statistics.result -%} {%- if data | length > 0 and
        data[0]['nb_mesures'] > 0 -%}
          {%- set s = data[0] -%}
          {{ {
            'nb_mesures': s['nb_mesures'],
            'poids_moyen': s['poids_moyen'],
            'poids_min': s['poids_min'],
            'poids_max': s['poids_max'],
            'amplitude': s['amplitude']
          } }}
        {%- else -%}
          {{ {'nb_mesures': 0, 'poids_moyen': 0, 'poids_min': 0, 'poids_max': 0, 'amplitude': 0} }}
        {%- endif -%}
  - action: ai_task.generate_data
    metadata: {}
    data:
      instructions: "Tu vas analyser les données fournies et TU NE DOIS RETOURNER QUE LE MESSAGE FINAL, sans aucune phrase avant ou après, sans commentaire, sans explication.\nPas de texte du type “Voici ton message :”, “Ok :”, “D’accord :”, etc.\nLa sortie doit commencer directement par la première phrase du message destiné à Nelly.\nAnalyse ces données de poids et génère un message oral, naturel et encourageant destiné à Nelly.\n\nUtilise strictement les valeurs fournies sans en modifier aucune.\n\nDonnées :\npoids_actuel: {{ poids_actuel }}\npoids_precedent: {{ poids_precedent }}\npoids_difference: {{ poids_difference }}\npoids_min: {{ poids_min_effectif }}\npoids_max: {{ poids_max_effectif }}\nperte_nelly: {{ perte_nelly }}\nprise_nelly: {{ prise_nelly }}\nimc: {{ imc }}\ntendance: {{ tendance }}\nstatistiques_10_mesures: {{ stats_poids }}\n\t•\tnb_mesures: nombre de pesées (max 10 dernières)\n\t•\tpoids_moyen: poids moyen sur les dernières pesées (stabilisation)\n\t•\tpoids_min: poids minimum atteint\n\t•\tpoids_max: poids maximum atteint\n\t•\tamplitude: différence entre max et min (fluctuation totale)\n\n⸻\n\nObjectif :\nCréer un message court, fluide et bienveillant, adapté à une synthèse vocale.\nParle à Nelly à la deuxième personne, sans utiliser « Salut Nelly » ni « Aujourd’hui ».\n\n⸻\n\nDirectives :\n\t•\tMentionne son poids actuel et la différence avec la dernière mesure de manière simple et naturelle.\n\t•\tParle en termes de dynamique ou de tendance ({{ tendance }}), pas de phrases évidentes.\n\t•\tUtilise les statistiques sur les dernières pesées pour contextualiser l’évolution :\n\t•\tSi amplitude < 2 kg : poids stable/stabilisé autour de poids_moyen\n\t•\tSi amplitude >= 2 kg : poids fluctuant entre poids_min et poids_max\n\t•\tMentionne si le poids actuel est proche du min, du max ou du moyen\n\t•\tMets en valeur la perte totale ({{ perte_nelly }} kg) de manière naturelle, sans enchaîner plusieurs chiffres.\n\t•\tUtilise l’IMC calculé ({{ imc }}) uniquement si utile au ton bienveillant, jamais comme diagnostic.\n\t•\tInterdiction de conseils génériques ou banals (ex: “continue comme ça”, “n’oublie pas de t’hydrater”, “mange équilibré”).\n\t•\tSi encouragement, il doit être spécifique aux données fournies (lié à {{ tendance }} ou {{ poids_difference }} ou aux dernières mesures) et en une seule phrase courte ; sinon, ne pas ajouter d’encouragement.\n\t•\tPas de listes, pas de bullet points, pas de ton médical.\n\t•\tStyle très oral, chaleureux, comme un coach bienveillant.\n\t•\tLa sortie doit être uniquement le message final, rien d’autre."
      task_name: Poids Nelly
    response_variable: response_variable
    enabled: true
    continue_on_error: true
  - variables:
      message_tts: >-
        {% set msg = response_variable.data if response_variable is defined and response_variable.data is defined else '' %}
        {% if msg | trim != '' %}
          {{ msg | trim }}
        {% else %}
          Tu es à {{ poids_actuel }} kilos, avec une variation de {{ variation_label }} kilo par rapport à la dernière mesure. La tendance est {{ tendance }}.
        {% endif %}
      message_notification: >-
        <b>Poids du {{ now().strftime('%d/%m/%Y') }}</b><br>
        Poids actuel : <b>{{ poids_actuel }} kg</b><br>
        Évolution : <b>{{ variation_label }} kg</b> depuis la dernière mesure<br>
        Tendance : <b>{{ tendance }}</b><br>
        Cette année : perte <b>{{ perte_nelly }} kg</b>, prise <b>{{ prise_nelly }} kg</b><br>
        Bornes enregistrées : min <b>{{ poids_min_effectif }} kg</b>, max <b>{{ poids_max_effectif }} kg</b>
  - data:
      media_player: media_player.salle_de_bain
      message: "{{ message_tts }}"
    action: script.tts_send_tts
    enabled: true
  - alias: Notification mobile
    action: script.notify_send_notifications
    data:
      target: nelly
      title: "[Santé]"
      message: "{{ message_notification }}"
      icon: mdi:scale-bathroom
      channel: health
    enabled: true
  - alias: Save to Google sheet
    action: rest_command.save_weight
    data:
      person: Nelly
      poids_actuel: "{{ poids_actuel }}"
      poids_precedent: "{{ poids_precedent }}"
      poids_difference: "{{ poids_difference }}"
      poids_prise: "{{ prise_nelly }}"
      poids_min: "{{ poids_min_effectif }}"
      poids_max: "{{ poids_max_effectif }}"
      imc: "{{ imc }}"
      tendance: "{{ tendance }}"
      context: "{{ message_tts }}"
    enabled: true
mode: single
