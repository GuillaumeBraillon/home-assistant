title: Oscar
icon: mdi:account
path: oscar
type: sections
subview: false
max_columns: 4
dense_section_placement: true
visible:
  - user: c7447f6dbd744a97a1aafc8d1d5d6305
  - user: 2ff2cdef1e4a45709c03849f9cf9420a
  - user: 2e7b70c51f3e453cb5ec7131df051882
badges:
  - type: entity
    show_name: false
    show_state: true
    show_icon: true
    entity: binary_sensor.motion_oscar_occupancy
    show_entity_picture: true
    state_content:
      - state
      - last_changed
  - type: entity
    show_name: false
    show_state: true
    show_icon: true
    entity: binary_sensor.magnet_oscar_contact
    show_entity_picture: true
    state_content:
      - state
      - last_changed
  - type: entity
    show_name: false
    show_state: true
    show_icon: true
    entity: sensor.temperature_oscar_temperature
    show_entity_picture: true
    state_content:
      - state
      - last_changed
  - type: entity
    show_name: false
    show_state: true
    show_icon: true
    entity: sensor.temperature_oscar_humidity
    show_entity_picture: true
    state_content:
      - state
      - last_changed
sections:
  - type: grid
    cards:
      - type: heading
        heading: 👤 Statut & Santé
      - type: entities
        state_color: true
        show_header_toggle: false
        entities:
          - entity: person.oscar
            secondary_info: last-changed
          - entity: device_tracker.samsung_a55
            name: Téléphone (GPS)
            secondary_info: last-updated
          - entity: sensor.samsung_a55_geocoded_location
            name: Adresse actuelle
            secondary_info: last-changed
          - entity: input_boolean.oscar_active
            name: Statut Actif
            secondary_info: last-changed
      - show_name: true
        show_icon: true
        show_state: true
        type: glance
        columns: 4
        entities:
          - entity: sensor.poids_oscar
            name: Poids
            icon: mdi:scale-bathroom
          - entity: input_number.poids_oscar_difference
            name: Écart
            icon: mdi:arrow-left-right
          - entity: sensor.imc_oscar
            name: Valeur
            icon: mdi:calculator
          - entity: sensor.imc_label_oscar
            name: Tranche
            icon: mdi:label-outline
      - type: map
        grid_options:
          rows: 5
          columns: full
        show_all: false
        entities:
          - entity: person.oscar
        hours_to_show: 12
        auto_fit: true
        fit_zones: true
        theme_mode: auto
  - type: grid
    cards:
      - type: heading
        heading: 🎛️ Équipements Chambre
      - type: tile
        grid_options:
          columns: full
        entity: input_boolean.mode_auto_oscar
        name: Mode Automatique
        icon: mdi:robot
        color: accent
        show_entity_picture: false
        hide_state: false
        state_content:
          - state
          - last_changed
        vertical: false
        features:
          - type: toggle
        features_position: bottom
      - type: tile
        grid_options:
          columns: full
        entity: light.yeelight_mono
        name: Plafonnier
        show_entity_picture: false
        hide_state: false
        state_content:
          - state
          - last_changed
        vertical: false
        features:
          - type: toggle
          - type: light-brightness
        features_position: bottom
      - type: tile
        grid_options:
          columns: full
        entity: light.atelier_smart_socket_4
        name: Bureau
        icon: mdi:desk-lamp
        state_content:
          - state
          - last_changed
        vertical: false
        features:
          - type: toggle
        features_position: bottom
      - type: tile
        grid_options:
          columns: full
        entity: cover.volets_oscar_state
        name: Volets
        state_content:
          - current_position
          - last_changed
        vertical: false
        features:
          - type: cover-open-close
          - type: cover-position
          - type: cover-position-favorite
        features_position: bottom
  - type: grid
    cards:
      - type: heading
        heading: 🎮 Gaming & Multimédia
      - type: entities
        state_color: true
        show_header_toggle: false
        entities:
          - entity: binary_sensor.oscope4908
            name: En Ligne
            secondary_info: last-changed
          - entity: binary_sensor.oscope4908_in_game
            name: En Jeu
            secondary_info: last-changed
          - entity: sensor.oscope4908_now_playing
            name: Activité Actuelle
            secondary_info: last-changed
          - entity: sensor.oscope4908_status
            name: Statut Statisique
            secondary_info: last-changed
          - entity: sensor.oscope4908_gamer_score
            name: Gamerscore
            secondary_info: last-changed
          - entity: binary_sensor.oscope4908_subscribed_to_xbox_game_pass
            name: Abonnement Game Pass
            secondary_info: last-changed
          - entity: sensor.oscope4908_last_online
            name: Dernier vu le
            secondary_info: last-changed
      - type: custom:apexcharts-card
        apex_config:
          chart:
            height: 170px
        experimental:
          color_threshold: true
        graph_span: 7d
        span:
          end: day
        show:
          last_updated: true
        header:
          show: true
          show_states: true
          colorize_states: true
          title: Utilisation Xbox
        yaxis:
          - min: 0
            max: ~6
            decimals: 0
            apex_config:
              tickAmount: 5
        series:
          - entity: sensor.oscope4908_oscar_xbox
            show:
              header_color_threshold: true
              extremas: true
              as_duration: hour
            type: column
            name: Durée
            group_by:
              func: last
              duration: 1d
            color_threshold:
              - value: 1
                color: darkcyan
              - value: 2
                color: goldenrod
              - value: 4
                color: orangered
              - value: 6
                color: darkred
      - type: media-control
        entity: media_player.google_home_oscar
        grid_options:
          columns: full
      - type: media-control
        entity: media_player.xbox
        grid_options:
          columns: full
      - type: custom:love-lock-card
        popup: REMOVED
        REMOVED: REMOVED
        cards:
          - type: tile
            entity: automation.tts_notification_xbox_on_2
            name: Limitation Parentale TTS
            icon: mdi:bullhorn-variant-outline
            tap_action:
              action: toggle
  - type: grid
    cards:
      - type: heading
        heading: 📱 Smartphone État
      - show_name: true
        show_icon: true
        show_state: true
        type: glance
        columns: 3
        entities:
          - entity: sensor.samsung_a55_battery_level
            name: Batterie
          - entity: binary_sensor.samsung_a55_is_charging
            name: En Charge
          - entity: sensor.samsung_a55_internal_storage
            name: Stockage
          - entity: sensor.samsung_a55_battery_temperature
            name: Temp. Batt
          - entity: sensor.samsung_a55_battery_health
            name: Santé
          - entity: sensor.samsung_a55_remaining_charge_time
            name: Restant
      - type: entities
        show_header_toggle: false
        entities:
          - entity: sensor.samsung_a55_detected_activity
            name: Activité Détectée
            secondary_info: last-changed
          - entity: sensor.samsung_a55_steps_sensor
            name: Nombre de Pas
            secondary_info: last-changed
          - entity: sensor.samsung_a55_daily_distance
            name: Distance du jour
            secondary_info: last-changed
          - entity: sensor.samsung_a55_sleep_confidence
            name: Indice Sommeil
            secondary_info: last-changed
          - entity: sensor.samsung_a55_sleep_segment
            name: Cycle Sommeil
            secondary_info: last-changed
        state_color: true
      - type: entities
        show_header_toggle: false
        entities:
          - entity: sensor.samsung_a55_wi_fi_connection
            name: Point d'accès Wi-Fi
            secondary_info: last-changed
          - entity: sensor.samsung_a55_wi_fi_signal_strength
            name: Signal Wi-Fi
            secondary_info: last-changed
          - entity: binary_sensor.samsung_a55_mobile_data
            name: Data Mobile actives
            secondary_info: last-changed
          - entity: sensor.samsung_a55_network_type
            name: Type de couverture
            secondary_info: last-changed
          - entity: sensor.samsung_a55_ringer_mode
            name: Profil Sonnerie
            secondary_info: last-changed
          - entity: sensor.samsung_a55_last_used_app
            name: Dernière application
            secondary_info: last-changed
          - entity: sensor.samsung_a55_next_alarm
            name: Alarme programmée
            secondary_info: last-changed
        state_color: true
cards: []
header:
  layout: center
  badges_position: bottom
  badges_wrap: scroll
