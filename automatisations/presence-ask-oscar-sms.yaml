alias: "[Presence] ASK SMS Oscar"
description: Gestion alarme selon présence d'Oscar et son statut actif
triggers:
  - entity_id:
      - person.guillaume
      - person.nelly
      - person.oscar
    trigger: state
actions:
  - variables:
      notify_targets:
        - guillaume
        - nelly
        - oscar
      parents_home: >-
        {{ is_state('person.guillaume', 'home') or is_state('person.nelly',
        'home') }}
      oscar_home: "{{ is_state('person.oscar', 'home') }}"
      oscar_actif: "{{ is_state('input_boolean.oscar_active', 'on') }}"
  - choose:
      - conditions:
          - condition: template
            value_template: |-
              {{
                oscar_actif
                and oscar_home
                and not parents_home
                and (
                  (
                    trigger.entity_id == 'person.oscar'
                    and trigger.from_state.state != 'home'
                    and trigger.to_state.state == 'home'
                  )
                  or (
                    trigger.entity_id in ['person.guillaume', 'person.nelly']
                    and trigger.from_state.state == 'home'
                    and trigger.to_state.state != 'home'
                  )
                )
                and trigger.from_state is not none
                and trigger.to_state is not none
                and trigger.from_state.state != trigger.to_state.state
              }}
            alias: Ask if Oscar Is Alone
        sequence:
          - action: script.notify_ask_mobile
            data:
              target: guillaume;nelly;oscar
              ask_tag: ask_oscar_presence
              title: "[Présence]"
              icon: mdi:account-question-outline
              channel: alarm_stream
              preset: alarm
              message: "[Présence] Oscar est-il seul à la maison ?"
              yes_title: Oui
              no_title: Non
              timeout: 300
              mobile_data:
                visibility: public
            response_variable: ask_result
          - variables:
              respondent: "{{ ask_result.respondent | default('unknown') }}"
              respondent_name: >-
                {% if respondent == 'guillaume' %}Papa {% elif respondent ==
                'nelly' %}Maman {% elif respondent == 'oscar' %}Oscar {% else
                %}Inconnu {% endif %}
          - alias: Handle Responses
            choose:
              - conditions:
                  - condition: template
                    value_template: "{{ ask_result.answer == 'timeout' }}"
                    alias: Timeout
                sequence:
                  - repeat:
                      for_each: "{{ notify_targets }}"
                      sequence:
                        - action: script.notify_send_notifications
                          data:
                            target: "{{ repeat.item }}"
                            title: "[Présence]"
                            message: Sans réponse, j'active l'alarme.
                            icon: mdi:account-alert-outline
                            channel: presence
                  - target:
                      entity_id: input_boolean.oscar_active
                    action: input_boolean.turn_off
              - conditions:
                  - condition: template
                    value_template: "{{ ask_result.answer == 'yes' }}"
                    alias: Confirmed Alone
                sequence:
                  - repeat:
                      for_each: "{{ notify_targets }}"
                      sequence:
                        - action: script.notify_send_notifications
                          data:
                            target: "{{ repeat.item }}"
                            title: "[Présence]"
                            message: >-
                              {{ respondent_name }} a répondu oui, je n'active
                              pas l'alarme.
                            icon: mdi:account-check-outline
                            channel: presence
              - conditions:
                  - condition: template
                    value_template: "{{ ask_result.answer == 'no' }}"
                    alias: Not Home
                sequence:
                  - repeat:
                      for_each: "{{ notify_targets }}"
                      sequence:
                        - action: script.notify_send_notifications
                          data:
                            target: "{{ repeat.item }}"
                            title: "[Présence]"
                            message: >-
                              {{ respondent_name }} a dit qu'Oscar n'est pas à
                              la maison, je désactive son statut pour activer
                              l'alarme.
                            icon: mdi:account-cancel-outline
                            channel: presence
                  - target:
                      entity_id: input_boolean.oscar_active
                    action: input_boolean.turn_off
mode: single
