type: sections
max_columns: 4
title: Confort
path: confort
icon: mdi:home-thermometer-outline
sections:
  - type: grid
    cards:
      - show_name: true
        show_icon: true
        show_state: true
        type: glance
        title: 🌬️ Gestion Aération
        columns: 2
        state_color: true
        entities:
          - entity: input_boolean.aeration_active
            name: Active
          - entity: binary_sensor.fenetres_maison
            name: Fenêtres
        card_mod:
          style:
            div.entity:
              $: |
                div {
                  display: flex !important;
                  flex-direction: column !important;
                  align-items: center !important;
                }
                span.state {
                  font-size: 14px !important;
                  font-weight: bold !important;
                  margin-top: 4px !important;
                  display: block !important;
                }
            .: |
              div.entity:nth-child(1)::after {
                content: "{% set t = (now() - as_local(states.input_boolean.aeration_active.last_changed | default(now()))).total_seconds() %}{% if t < 60 %}Maintenant{% elif t < 3600 %}{{ (t / 60) | int }} min{% elif t < 86400 %}{{ (t / 3600) | int }} h{% else %}{{ (t / 86400) | int }} j{% endif %}";
                font-size: 10px; color: var(--secondary-text-color); display: block; text-align: center; margin-top: 2px;
              }
              div.entity:nth-child(2)::after {
                content: "{% set t = (now() - as_local(states.binary_sensor.fenetres_maison.last_changed | default(now()))).total_seconds() %}{% if t < 60 %}Maintenant{% elif t < 3600 %}{{ (t / 60) | int }} min{% elif t < 86400 %}{{ (t / 3600) | int }} h{% else %}{{ (t / 86400) | int }} j{% endif %}";
                font-size: 10px; color: var(--secondary-text-color); display: block; text-align: center; margin-top: 2px;
              }
              div.entity:nth-child(3)::after {
                content: "{% set t = (now() - as_local(states.input_number.temp_reference_aeration.last_changed | default(now()))).total_seconds() %}{% if t < 60 %}Maintenant{% elif t < 3600 %}{{ (t / 60) | int }} min{% elif t < 86400 %}{{ (t / 3600) | int }} h{% else %}{{ (t / 86400) | int }} j{% endif %}";
                font-size: 10px; color: var(--secondary-text-color); display: block; text-align: center; margin-top: 2px;
              }
              div.entity:nth-child(4)::after {
                content: "{% set t = (now() - as_local(states.input_number.temp_min_aeration.last_changed | default(now()))).total_seconds() %}{% if t < 60 %}Maintenant{% elif t < 3600 %}{{ (t / 60) | int }} min{% elif t < 86400 %}{{ (t / 3600) | int }} h{% else %}{{ (t / 86400) | int }} j{% endif %}";
                font-size: 10px; color: var(--secondary-text-color); display: block; text-align: center; margin-top: 2px;
              }
              div.entity:nth-child(5)::after {
                content: "{% set t = (now() - as_local(states.sensor.temperatures_maison.last_changed | default(now()))).total_seconds() %}{% if t < 60 %}Maintenant{% elif t < 3600 %}{{ (t / 60) | int }} min{% elif t < 86400 %}{{ (t / 3600) | int }} h{% else %}{{ (t / 86400) | int }} j{% endif %}";
                font-size: 10px; color: var(--secondary-text-color); display: block; text-align: center; margin-top: 2px;
              }
              div.entity:nth-child(6)::after {
                content: "{% set t = (now() - as_local(states.input_number.humid_reference_aeration.last_changed | default(now()))).total_seconds() %}{% if t < 60 %}Maintenant{% elif t < 3600 %}{{ (t / 60) | int }} min{% elif t < 86400 %}{{ (t / 3600) | int }} h{% else %}{{ (t / 86400) | int }} j{% endif %}";
                font-size: 10px; color: var(--secondary-text-color); display: block; text-align: center; margin-top: 2px;
              }
              div.entity:nth-child(7)::after {
                content: "{% set t = (now() - as_local(states.input_number.humid_min_aeration.last_changed | default(now()))).total_seconds() %}{% if t < 60 %}Maintenant{% elif t < 3600 %}{{ (t / 60) | int }} min{% elif t < 86400 %}{{ (t / 3600) | int }} h{% else %}{{ (t / 86400) | int }} j{% endif %}";
                font-size: 10px; color: var(--secondary-text-color); display: block; text-align: center; margin-top: 2px;
              }
              div.entity:nth-child(8)::after {
                content: "{% set t = (now() - as_local(states.sensor.humidite_maison.last_changed | default(now()))).total_seconds() %}{% if t < 60 %}Maintenant{% elif t < 3600 %}{{ (t / 60) | int }} min{% elif t < 86400 %}{{ (t / 3600) | int }} h{% else %}{{ (t / 86400) | int }} j{% endif %}";
                font-size: 10px; color: var(--secondary-text-color); display: block; text-align: center; margin-top: 2px;
              }
      - show_name: true
        show_icon: true
        show_state: true
        type: glance
        title: 🌡️ Températures
        columns: 3
        state_color: true
        entities:
          - entity: input_number.temp_reference_aeration
            name: Ouverture
          - entity: input_number.temp_min_aeration
            name: Minimale
          - entity: sensor.temperatures_maison
            name: Actuelle
        card_mod:
          style:
            div.entity:
              $: |
                div {
                  display: flex !important;
                  flex-direction: column !important;
                  align-items: center !important;
                }
                span.state {
                  font-size: 14px !important;
                  font-weight: bold !important;
                  margin-top: 4px !important;
                  display: block !important;
                }
            .: >
              {% macro get_time(entity_id) -%}
                {%- set t = (now() - as_local(states[entity_id].last_changed | default(now()))).total_seconds() -%}
                {%- if t < 60 -%}Maintenant
                {%- elif t < 3600 -%}{{ (t / 60) | int }} min
                {%- elif t < 86400 -%}{{ (t / 3600) | int }} h
                {%- else -%}{{ (t / 86400) | int }} j
                {%- endif -%}
              {%- endmacro %}


              div.entity:nth-child(1)::after { content: "{{
              get_time('input_number.temp_reference_aeration') | trim }}"; }

              div.entity:nth-child(2)::after { content: "{{
              get_time('input_number.temp_min_aeration') | trim }}"; }

              div.entity:nth-child(3)::after { content: "{{
              get_time('sensor.temperatures_maison') | trim }}"; }


              div.entity::after {
                font-size: 10px;
                color: var(--secondary-text-color);
                display: block;
                text-align: center;
                margin-top: 2px;
              }
      - show_name: true
        show_icon: true
        show_state: true
        type: glance
        title: 💧 Humidités
        columns: 3
        state_color: true
        entities:
          - entity: input_number.humid_reference_aeration
            name: Ouverture
            icon: mdi:home-percent-outline
          - entity: input_number.humid_min_aeration
            name: Minimale
            icon: mdi:cloud-percent-outline
          - entity: sensor.humidite_maison
            name: Actuelle
        card_mod:
          style:
            div.entity:
              $: |
                div {
                  display: flex !important;
                  flex-direction: column !important;
                  align-items: center !important;
                }
                span.state {
                  font-size: 14px !important;
                  font-weight: bold !important;
                  margin-top: 4px !important;
                  display: block !important;
                }
            .: >
              {% macro get_time(entity_id) -%}
                {%- set t = (now() - as_local(states[entity_id].last_changed | default(now()))).total_seconds() -%}
                {%- if t < 60 -%}Maintenant
                {%- elif t < 3600 -%}{{ (t / 60) | int }} min
                {%- elif t < 86400 -%}{{ (t / 3600) | int }} h
                {%- else -%}{{ (t / 86400) | int }} j
                {%- endif -%}
              {%- endmacro %}


              div.entity:nth-child(1)::after { content: "{{
              get_time('input_number.humid_reference_aeration') | trim }}"; }

              div.entity:nth-child(2)::after { content: "{{
              get_time('input_number.humid_min_aeration') | trim }}"; }

              div.entity:nth-child(3)::after { content: "{{
              get_time('sensor.humidite_maison') | trim }}"; }


              div.entity::after {
                font-size: 10px;
                color: var(--secondary-text-color);
                display: block;
                text-align: center;
                margin-top: 2px;
              }
      - type: entities
        title: 🪟 Gestion des Volets
        state_color: true
        show_header_toggle: false
        entities:
          - type: section
            label: Pièces à vivre
          - entity: cover.volets_salon_state
            name: Salon
            secondary_info: position
          - entity: input_boolean.volets_salon_auto
            name: Automatisation Salon
            secondary_info: last-changed
          - type: section
            label: Chambres
          - entity: cover.volets_parents_state
            name: Parents
            secondary_info: position
          - entity: cover.volets_oscar_state
            name: Oscar
            secondary_info: position
          - entity: cover.volets_eliott_state
            name: Eliott
            secondary_info: position
  - type: grid
    cards:
      - type: entities
        entities:
          - entity: sensor.temperatures_maison
            secondary_info: last-changed
          - entity: sensor.humidite_maison
            secondary_info: last-changed
          - entity: sensor.vindstyrka_air_quality_temperature
            secondary_info: last-changed
            name: Température cuisine
          - entity: sensor.vindstyrka_air_quality_humidity
            name: Humidité cuisine
            secondary_info: last-changed
          - entity: sensor.temperature_salon
            secondary_info: last-changed
            name: Salon
          - entity: sensor.humidite_salon
            secondary_info: last-changed
            name: "Humidité "
          - entity: sensor.temperature_parents_temperature
            secondary_info: last-changed
            name: Parents
          - entity: sensor.temperature_parents_humidity
            secondary_info: last-changed
            name: "Humidité "
          - entity: sensor.temperature_oscar_temperature
            secondary_info: last-changed
            name: "Oscar "
          - entity: sensor.temperature_oscar_humidity
            name: Humidité
            secondary_info: last-changed
          - entity: sensor.temperature_eliott_temperature
            secondary_info: last-changed
            name: "Éliott "
          - entity: sensor.temperature_eliott_humidity
            secondary_info: last-changed
            name: Humidité
          - entity: sensor.xiaomi_wleak_aq1_device_temperature
            secondary_info: last-changed
            name: "Salle de bain "
        title: Températures & humidité
        state_color: true
  - type: grid
    cards:
      - type: history-graph
        entities:
          - entity: sensor.temperatures_maison
          - entity: sensor.temperature_salon
          - entity: sensor.vindstyrka_air_quality_temperature
            name:
              - type: entity
              - type: area
          - entity: sensor.temperature_parents_temperature
          - entity: sensor.temperature_oscar_temperature
            name:
              type: device
          - entity: sensor.temperature_eliott_temperature
            name:
              type: device
        title: Températures
        hours_to_show: 5
        logarithmic_scale: false
      - type: history-graph
        entities:
          - entity: sensor.humidite_maison
          - entity: sensor.humidite_salon
          - entity: sensor.vindstyrka_air_quality_humidity
            name:
              - type: entity
              - type: text
                text: Cuisine
          - entity: sensor.temperature_parents_humidity
            name: Humidité Parents
          - entity: sensor.temperature_oscar_humidity
            name: Humidité Oscar
          - entity: sensor.temperature_eliott_humidity
            name: Humidité Eliott
        title: Humidité
        hours_to_show: 5
        logarithmic_scale: false
  - type: grid
    cards:
      - show_current: true
        show_forecast: true
        type: weather-forecast
        entity: weather.lyon
        name: Météo France
        forecast_type: daily
      - show_current: true
        show_forecast: true
        type: weather-forecast
        entity: weather.maison
        name: Open Météo
        forecast_type: daily
cards: []
