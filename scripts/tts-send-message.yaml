alias: "[TTS] Send TTS"
sequence:
  - alias: A media_player in Séjour is already Playing
    if:
      - alias: If a media_player in Salon
        condition: template
        value_template: >-
          {{ media_player in ['media_player.mi_smart_home_salon',
          'media_player.nest_hub', 'media_player.sejour',
          'media_player.tout_sauf_enfants', 'media_player.tout_sauf_parents',
          'media_player.toutes_les_enceintes','media_player.ni_oscar_ni_parents']
          }}
      - condition: template
        value_template: >-
          {{ is_state('media_player.mi_smart_home_salon', 'playing') or
          is_state('media_player.nest_hub', 'playing') }}
        alias: If Nest Hub or Home Salon Playing
    then:
      - data:
          action: tts
          message: (Pause;  1 0),{{ message }}
        alias: TTS On JPI
        action: script.mqtt_send_topics
    else:
      - data:
          volume_level: "{{ states('input_number.now_volume') |int /100 }}"
        target:
          entity_id: "{{ media_player }}"
        action: media_player.volume_set
      - alias: IF sncf true
        if:
          - condition: template
            value_template: "{{sncf}}"
        then:
          - action: media_player.play_media
            target:
              entity_id: "{{ media_player }}"
            data:
              media:
                media_content_id: media-source://media_source/media/SNCF 2015.wav
                media_content_type: audio/x-wav
                metadata:
                  title: SNCF 2015.wav
                  thumbnail: null
                  media_class: music
                  children_media_class: null
                  navigateIds:
                    - {}
                    - media_content_type: app
                      media_content_id: media-source://media_source
            enabled: true
          - delay:
              hours: 0
              minutes: 0
              seconds: 5
              milliseconds: 0
      - action: tts.speak
        target:
          entity_id: tts.google_cloud
        data:
          cache: true
          media_player_entity_id: "{{ media_player }}"
          message: "{{ message }}"
      - delay:
          hours: 0
          minutes: 0
          seconds: 10
          milliseconds: 0
      - wait_template: "{{ not is_state(media_player, 'playing') }}"
        timeout: "00:01:00"
        continue_on_timeout: true
        alias: Wait media_player not Playing
      - data: {}
        target:
          entity_id: "{{ media_player }}"
        alias: Turn off media player.
        action: media_player.turn_off
mode: queued
icon: mdi:google-assistant
