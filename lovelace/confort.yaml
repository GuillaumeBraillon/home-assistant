      - type: custom:apexcharts-card
        graph_span: 24h
        show:
          last_updated: true
        header:
          show: true
          title: Qualité de l'air (24h)
        yaxis:
          - id: pm25
            apex_config:
              forceNiceScale: true
              tickAmount: 7
          - id: voc
            opposite: true
            apex_config:
              forceNiceScale: true
              tickAmount: 7
        series:
          - entity: sensor.vindstyrka_air_quality_pm25
            name: PM2.5
            type: column
            group_by:
              func: max
              duration: 5m
            stroke_width: 2
            yaxis_id: pm25
          - entity: sensor.vindstyrka_air_quality_voc_index
            name: VOC Index
            type: line
            group_by:
              func: max
              duration: 5m
            stroke_width: 2
            yaxis_id: voc
