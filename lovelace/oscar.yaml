        name: Dernier vu
        state_content:
          - state
          - last_changed
        vertical: false
        features_position: bottom
      - type: custom:apexcharts-card
        apex_config:
          chart:
            height: 170px
        experimental:
          color_threshold: true
        graph_span: 7d
        span:
          end: day
        show:
          last_updated: true
        header:
          show: true
          show_states: true
          colorize_states: true
          title: Utilisation Xbox
        yaxis:
          - min: 0
            max: ~6
            decimals: 0
            apex_config:
              tickAmount: 5
        series:
          - entity: sensor.oscope4908_oscar_xbox
            show:
              header_color_threshold: true
              extremas: true
              as_duration: hour
            type: column
            name: Durée
            group_by:
              func: last
              duration: 1d
            color_threshold:
              - value: 1
                color: darkcyan
              - value: 2
                color: goldenrod
              - value: 4
                color: orangered
              - value: 6
                color: darkred
      - type: heading
        heading: 📺 Multimédia & Contrôle
      - type: media-control
        entity: media_player.google_home_oscar
        grid_options:
          columns: 12
      - type: media-control
        entity: media_player.xbox
        grid_options:
          columns: 12
      - type: custom:love-lock-card
        popup: REMOVED
        REMOVED: REMOVED
        grid_options:
          columns: 12
        cards:
          - type: tile
            entity: automation.tts_notification_xbox_on_2
            name: Limitation Parentale TTS
            icon: mdi:bullhorn-variant-outline
            tap_action:
              action: toggle
            vertical: false
            features_position: bottom
