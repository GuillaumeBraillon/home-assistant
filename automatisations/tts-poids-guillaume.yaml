alias: "[TTS] Poids Guillaume IA"
description: >-
  Annonce TTS et SMS lors d’une nouvelle mesure de poids de Guillaume, historise
  min/max/diff, et génère un texte motivant via IA.
triggers:
  - entity_id: sensor.poids_guillaume
    trigger: state
    enabled: true
conditions:
  - condition: template
    value_template: "{{ trigger.to_state.state | float > 0 }}"
    enabled: true
actions:
  - variables:
      poids_actuel: "{{ states('sensor.poids_guillaume') | float }}"
      poids_precedent: "{{ trigger.from_state.state | float }}"
      poids_difference: "{{ (poids_actuel - poids_precedent) | round(2) }}"
      poids_min: "{{ states('input_number.poids_guillaume_min') | float }}"
      poids_max: "{{ states('input_number.poids_guillaume_max') | float }}"
      perte_guillaume: "{{ states('sensor.poids_guillaume_perte') | float }}"
      prise_guillaume: "{{ states('sensor.poids_guillaume_prise') | float }}"
      imc: "{{ (poids_actuel / (1.80 * 1.80)) | round(1) }}"
      tendance: >-
        {% if poids_difference < -0.01 %}baisse{% elif poids_difference > 0.01
        %}hausse{% else %}stable{% endif %}
  - data:
      entity_id: input_number.poids_guillaume_difference
      value: "{{ poids_difference }}"
    action: input_number.set_value
    enabled: true
  - alias: Mise à jour du Poids Min / Max
    choose:
      - conditions:
          - condition: template
            value_template: "{{ poids_actuel > poids_max }}"
        sequence:
          - data:
              entity_id: input_number.poids_guillaume_max
              value: "{{ poids_actuel }}"
            action: input_number.set_value
      - conditions:
          - condition: template
            value_template: "{{ poids_actuel < poids_min }}"
        sequence:
          - data:
              entity_id: input_number.poids_guillaume_min
              value: "{{ poids_actuel }}"
            action: input_number.set_value
    enabled: true
  - alias: SQL GET HISTO 10 LAST
    action: sql.query
    metadata: {}
    data:
      query: |-
        SELECT
            COUNT(*) as nb_mesures,
            ROUND(AVG((t1.min + t1.max) / 2), 1) as poids_moyen,
            ROUND(MIN(t1.min), 1) as poids_min,
            ROUND(MAX(t1.max), 1) as poids_max,
            ROUND(MAX(t1.max) - MIN(t1.min), 1) as amplitude
        FROM (
            SELECT *
            FROM statistics AS t1
            INNER JOIN statistics_meta AS t2 ON t1.metadata_id = t2.id
            WHERE
                t2.statistic_id = 'sensor.poids_guillaume'
                AND t1.min != t1.max
            ORDER BY t1.start_ts DESC
            LIMIT 10
        ) as t1;
    response_variable: result_statistics
  - variables:
      stats_poids: >-
        {%- set data = result_statistics.result -%} {%- if data | length > 0 and
        data[0]['nb_mesures'] > 0 -%}
          {%- set s = data[0] -%}
          {{ {
            'nb_mesures': s['nb_mesures'],
            'poids_moyen': s['poids_moyen'],
            'poids_min': s['poids_min'],
            'poids_max': s['poids_max'],
            'amplitude': s['amplitude']
          } }}
        {%- else -%}
          {{ {'nb_mesures': 0, 'poids_moyen': 0, 'poids_min': 0, 'poids_max': 0, 'amplitude': 0} }}
        {%- endif -%}
  - action: ai_task.generate_data
    metadata: {}
    data:
      instructions: "Tu vas analyser les données fournies et TU NE DOIS RETOURNER QUE LE MESSAGE FINAL, sans aucune phrase avant ou après, sans commentaire, sans explication.\nPas de texte du type “Voici ton message :”, “Ok :”, “D’accord :”, etc.\nLa sortie doit commencer directement par la première phrase du message destiné à Guillaume.\nAnalyse ces données de poids et génère un message oral, naturel et encourageant destiné à Guillaume.\n\nUtilise strictement les valeurs fournies sans en modifier aucune.\n\nDonnées :\npoids_actuel: {{ poids_actuel }}\npoids_precedent: {{ poids_precedent }}\npoids_difference: {{ poids_difference }}\npoids_min: {{ poids_min }}\npoids_max: {{ poids_max }}\nperte_guillaume: {{ perte_guillaume }}\nprise_guillaume: {{ prise_guillaume }}\nimc: {{ imc }}\ntendance: {{ tendance }}\nstatistiques_10_mesures: {{ stats_poids }}\n\t•\tnb_mesures: nombre de pesées (max 10 dernières)\n\t•\tpoids_moyen: poids moyen sur les dernières pesées (stabilisation)\n\t•\tpoids_min: poids minimum atteint\n\t•\tpoids_max: poids maximum atteint\n\t•\tamplitude: différence entre max et min (fluctuation totale)\n\n⸻\n\nObjectif :\nCréer un message court, fluide et bienveillant, adapté à une synthèse vocale.\nParle à Guillaume à la deuxième personne, sans utiliser « Salut Guillaume » ni « Aujourd’hui ».\n\n⸻\n\nDirectives :\n\t•\tMentionne son poids actuel et la différence avec la dernière mesure de manière simple et naturelle.\n\t•\tParle en termes de dynamique ou de tendance ({{ tendance }}), pas de phrases évidentes.\n\t•\tUtilise les statistiques sur les dernières pesées pour contextualiser l’évolution :\n\t•\tSi amplitude < 2 kg : poids stable/stabilisé autour de poids_moyen\n\t•\tSi amplitude >= 2 kg : poids fluctuant entre poids_min et poids_max\n\t•\tMentionne si le poids actuel est proche du min, du max ou du moyen\n\t•\tMets en valeur la perte totale ({{ perte_guillaume }} kg) de manière naturelle, sans enchaîner plusieurs chiffres.\n\t•\tUtilise l’IMC calculé ({{ imc }}) uniquement si utile au ton bienveillant, jamais comme diagnostic.\n\t•\tInterdiction de conseils génériques ou banals (ex: “continue comme ça”, “n’oublie pas de t’hydrater”, “mange équilibré”).\n\t•\tSi encouragement, il doit être spécifique aux données fournies (lié à {{ tendance }} ou {{ poids_difference }} ou aux dernières mesures) et en une seule phrase courte ; sinon, ne pas ajouter d’encouragement.\n\t•\tPas de listes, pas de bullet points, pas de ton médical.\n\t•\tStyle très oral, chaleureux, comme un coach bienveillant.\n\t•\tLa sortie doit être uniquement le message final, rien d’autre."
      task_name: Poids Guillaume
    response_variable: response_variable
    enabled: true
    continue_on_error: true
  - data:
      media_player: media_player.salle_de_bain
      message: "{{response_variable.data}}"
    action: script.tts_send_tts
    enabled: true
  - alias: Message SMS
    data:
      action: sendSms
      number: "TELEPHONE_SUPPRIME"
      message: >-
        [Santé] du {{ now().strftime('%d/%m/%Y') }} pour Guillaume. Poids : {{
        poids_actuel }} Kg. Différence : {{ poids_difference }} Kg. Cette année
        :
          - Perte : {{ perte_guillaume }} Kg.
          - Prise : {{ prise_guillaume }} Kg.
          - Min : {{ poids_min }} Kg.
          - Max : {{ poids_max }} Kg.
    action: script.mqtt_send_topics
    enabled: true
mode: single
