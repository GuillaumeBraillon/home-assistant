# Configuration for daytime.
day_light_lumi_salon:
  name: Luminosité Journée Salon
  initial: 100
  min: 1
  max: 100
  step: 1
  unit_of_measurement: "%"
  icon: mdi:sun-wireless
day_light_temp_salon:
  name: Température Journée Salon
  initial: 4500
  min: 1700
  max: 6500
  step: 100
  icon: mdi:sun-thermometer-outline
day_light_lumi_chambres:
  name: Luminosité Journée Chambres
  initial: 60
  min: 1
  max: 100
  step: 1
  unit_of_measurement: "%"
  icon: mdi:sun-wireless
day_light_temp_chambres:
  name: Température Journée Chambres
  initial: 2700
  min: 1700
  max: 6500
  step: 100
  icon: mdi:sun-thermometer-outline
day_light_delay_off:
  name: Délai d'extinction Journée
  initial: 5
  min: 1
  max: 30
  step: 1
  unit_of_measurement: "min"
  icon: mdi:sun-clock-outline
day_volume:
  name: Volume en Journée
  initial: 50
  min: 10
  max: 100
  step: 10
  unit_of_measurement: "%"
  icon: mdi:volume-source

