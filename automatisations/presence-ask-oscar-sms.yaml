alias: "[Presence] ASK SMS Oscar"
description: "Gestion alarme selon présence d'Oscar et ses clés"
mode: single
trigger:
  - platform: state
    entity_id:
      - person.guillaume
      - person.nelly
      - person.oscar

variables:
  notify_targets:
    - guillaume
    - nelly
    - oscar
  parents_home: "{{ is_state('person.guillaume', 'home') or is_state('person.nelly', 'home') }}"
  oscar_home: "{{ is_state('person.oscar', 'home') }}"
  oscar_keys: "{{ is_state('input_boolean.oscar_active', 'on') }}"

action:
  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{
                oscar_keys
                and oscar_home
                and not parents_home
                and trigger.from_state is not none
                and trigger.to_state is not none
                and trigger.from_state.state != trigger.to_state.state
              }}
        sequence:
          - action: script.notify_ask_mobile
            data:
              target: "guillaume;nelly;oscar"
              ask_tag: ask_oscar_presence
              title: "[Présence]"
              icon: mdi:account-question-outline
              channel: presence
              message: "[Présence] Oscar est-il seul à la maison ?"
              yes_title: "Oui"
              no_title: "Non"
              timeout: 300
            response_variable: ask_result
          - variables:
              respondent: "{{ ask_result.respondent | default('unknown') }}"
              respondent_name: >-
                {% if respondent == 'guillaume' %}Papa
                {% elif respondent == 'nelly' %}Maman
                {% elif respondent == 'oscar' %}Oscar
                {% else %}Inconnu
                {% endif %}
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ ask_result.answer == 'timeout' }}"
                sequence:
                  - repeat:
                      for_each: "{{ notify_targets }}"
                      sequence:
                        - action: script.notify_send_notifications
                          data:
                            target: "{{ repeat.item }}"
                            title: "[Présence]"
                            message: "Sans réponse, j'active l'alarme."
                            icon: mdi:account-alert-outline
                            channel: presence
                  - service: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.oscar_active
              - conditions:
                  - condition: template
                    value_template: "{{ ask_result.answer == 'yes' }}"
                sequence:
                  - repeat:
                      for_each: "{{ notify_targets }}"
                      sequence:
                        - action: script.notify_send_notifications
                          data:
                            target: "{{ repeat.item }}"
                            title: "[Présence]"
                            message: "{{ respondent_name }} a répondu oui, je n'active pas l'alarme."
                            icon: mdi:account-check-outline
                            channel: presence
              - conditions:
                  - condition: template
                    value_template: "{{ ask_result.answer == 'no' }}"
                sequence:
                  - repeat:
                      for_each: "{{ notify_targets }}"
                      sequence:
                        - action: script.notify_send_notifications
                          data:
                            target: "{{ repeat.item }}"
                            title: "[Présence]"
                            message: "{{ respondent_name }} a dit qu'Oscar n'est pas à la maison, je désactive ses clés pour activer l'alarme."
                            icon: mdi:account-cancel-outline
                            channel: presence
                  - service: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.oscar_active
                  - service: button.press
                    target:
                      entity_id: button.change_presence_nut_oscar

      - conditions:
          - condition: template
            value_template: "{{ not oscar_keys }}"
        sequence:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.oscar_active
