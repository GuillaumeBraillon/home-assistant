      - type: custom:apexcharts-card
        apex_config:
          chart:
            height: 170px
        experimental:
          color_threshold: true
        graph_span: 7d
        span:
          end: day
        show:
          last_updated: true
        header:
          show: true
          show_states: true
          colorize_states: true
          title: Utilisation Xbox
        yaxis:
          - min: 0
            max: ~6
            decimals: 0
            apex_config:
              tickAmount: 5
        series:
          - entity: sensor.blusy38_eliott_xbox
            show:
              header_color_threshold: true
              extremas: true
              as_duration: hour
            type: column
            name: Durée
            group_by:
              func: last
              duration: 1d
            color_threshold:
              - value: 1
                color: darkcyan
              - value: 2
                color: goldenrod
              - value: 4
                color: orangered
              - value: 6
                color: darkred
