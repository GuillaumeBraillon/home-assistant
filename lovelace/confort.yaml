header:
  layout: center
  badges_position: bottom
  badges_wrap: scroll
badges:
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: input_select.modes_maison
    state_content:
      - state
      - last_changed
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: group.persons
    state_content:
      - state
      - last_changed
  - type: entity
    show_name: false
    show_state: true
    show_icon: true
    entity: person.guillaume
    show_entity_picture: true
    state_content:
      - state
      - last_changed
  - type: entity
    show_name: false
    show_state: true
    show_icon: true
    entity: person.nelly
    show_entity_picture: true
    state_content:
      - state
      - last_changed
  - type: entity
