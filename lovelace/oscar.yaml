theme: Backend-selected
title: Oscar
icon: mdi:account
path: oscar
type: sections
subview: true
max_columns: 4
dense_section_placement: true
visible:
  - user: c7447f6dbd744a97a1aafc8d1d5d6305
  - user: 2ff2cdef1e4a45709c03849f9cf9420a
  - user: 2e7b70c51f3e453cb5ec7131df051882
badges:
  - type: entity
    entity: person.oscar
    show_name: false
    show_state: true
    show_icon: true
    show_entity_picture: true
    state_content:
      - state
      - last_changed
  - type: entity
    entity: binary_sensor.motion_oscar_occupancy
    show_name: false
    show_state: true
    show_icon: true
  - type: entity
    entity: sensor.temperature_oscar_temperature
    show_name: false
    show_state: true
    show_icon: true
  - type: entity
    entity: sensor.temperature_oscar_humidity
    show_name: false
    show_state: true
    show_icon: true
sections:
  - type: grid
    cards:
      - type: heading
        heading: 👤 Statut & Santé
      - type: entities
        title: Présence & Trackers
        state_color: true
        show_header_toggle: false
        entities:
          - entity: person.oscar
            secondary_info: last-changed
          - entity: device_tracker.nut_vert_presence
            name: Clés (Nut)
            secondary_info: last-changed
          - entity: button.change_presence_nut_oscar
            name: Forcer présence Clés
            icon: mdi:cellphone-key
          - entity: device_tracker.samsung_a55
            name: Téléphone (GPS)
            secondary_info: last-updated
          - entity: sensor.samsung_a55_geocoded_location
            name: Adresse actuelle
            secondary_info: last-changed
          - entity: input_boolean.oscar_active
            name: Statut Actif
            secondary_info: last-changed
      - type: glance
        title: Suivi du Poids (IMC)
        columns: 4
        show_name: true
        show_icon: true
        show_state: true
        entities:
          - entity: sensor.poids_oscar
            name: Poids
            icon: mdi:scale-bathroom
          - entity: input_number.poids_oscar_difference
            name: Écart
            icon: mdi:arrow-left-right
          - entity: sensor.imc_oscar
            name: Valeur
            icon: mdi:calculator
          - entity: sensor.imc_label_oscar
            name: Tranche
            icon: mdi:label-outline
      - type: map
        grid_options:
          rows: 5
          columns: full
        show_all: false
        entities:
          - entity: person.oscar
        hours_to_show: 12
        auto_fit: true
        fit_zones: true
        theme_mode: auto
  - type: grid
    cards:
      - type: heading
        heading: 🎛️ Équipements Chambre
      - type: tile
        entity: input_boolean.mode_auto_oscar
        name: Mode Automatique
        icon: mdi:robot
        color: accent
        features:
          - type: toggle
        grid_options:
          columns: full
      - type: tile
        entity: light.yeelight_mono
        name: Plafonnier
        features:
          - type: toggle
          - type: light-brightness
        grid_options:
          columns: full
      - type: tile
        entity: light.atelier_smart_socket_4
        name: Bureau
        icon: mdi:desk-lamp
        features:
          - type: toggle
        grid_options:
          columns: full
      - type: tile
        entity: cover.volets_oscar_state
        name: Volets
        features:
          - type: cover-open-close
          - type: cover-position
        grid_options:
          columns: full
  - type: grid
    cards:
      - type: heading
        heading: 🎮 Gaming & Multimédia
      - type: grid
        square: false
        columns: 3
        grid_options:
          columns: full
        cards:
          - type: picture
            image_entity: image.oscope4908_avatar
          - type: picture
            image_entity: image.oscope4908_gamerpic
          - type: picture
            image_entity: image.oscope4908_now_playing
      - type: media-control
        entity: media_player.google_home_oscar
        grid_options:
          columns: full
      - type: media-control
        entity: media_player.xbox
        grid_options:
          columns: full
      - type: custom:apexcharts-card
        graph_span: 7d
        span:
          end: day
        header:
          show: true
          title: Temps de jeu hebdomadaire
          show_states: true
          colorize_states: true
        yaxis:
          - min: 0
            max: ~6
            decimals: 0
            apex_config:
              tickAmount: 5
        series:
          - entity: sensor.xbox_on_today
            type: column
            name: Durée
            group_by:
              func: last
              duration: 1d
            color_threshold:
              - value: 1
                color: "#008b8b"
              - value: 2
                color: "#b8860b"
              - value: 4
                color: "#ff4500"
              - value: 6
                color: "#8b0000"
      - type: entities
        title: Métriques Xbox Live
        state_color: true
        show_header_toggle: false
        entities:
          - entity: binary_sensor.oscope4908
            name: En Ligne
          - entity: binary_sensor.oscope4908_in_game
            name: En Jeu
          - entity: sensor.oscope4908_now_playing
            name: Activité Actuelle
          - entity: sensor.oscope4908_status
            name: Statut Statisique
          - entity: sensor.oscope4908_gamer_score
            name: Gamerscore
          - entity: binary_sensor.oscope4908_subscribed_to_xbox_game_pass
            name: Abonnement Game Pass
          - entity: sensor.oscope4908_last_online
            name: Dernier vu le
      - type: custom:love-lock-card
        popup: REMOVED
        REMOVED: REMOVED
        cards:
          - type: tile
            entity: automation.tts_notification_xbox_on_2
            name: Limitation Parentale TTS
            icon: mdi:bullhorn-variant-outline
            tap_action:
              action: toggle
  - type: grid
    cards:
      - type: heading
        heading: 📱 Smartphone État
      - type: glance
        title: Matériel & Batterie
        columns: 3
        entities:
          - entity: sensor.samsung_a55_battery_level
            name: Batterie
          - entity: binary_sensor.samsung_a55_is_charging
            name: En Charge
          - entity: sensor.samsung_a55_internal_storage
            name: Stockage
          - entity: sensor.samsung_a55_battery_temperature
            name: Temp. Batt
          - entity: sensor.samsung_a55_battery_health
            name: Santé
          - entity: sensor.samsung_a55_remaining_charge_time
            name: Restant
      - type: entities
        title: Activité & Données Physiques
        show_header_toggle: false
        entities:
          - entity: sensor.samsung_a55_detected_activity
            name: Activité Détectée
          - entity: sensor.samsung_a55_steps_sensor
            name: Nombre de Pas
          - entity: sensor.samsung_a55_daily_distance
            name: Distance du jour
          - entity: sensor.samsung_a55_sleep_confidence
            name: Indice Sommeil
          - entity: sensor.samsung_a55_sleep_segment
            name: Cycle Sommeil
      - type: entities
        title: Réseau & Système
        show_header_toggle: false
        entities:
          - entity: sensor.samsung_a55_wi_fi_connection
            name: Point d'accès Wi-Fi
          - entity: sensor.samsung_a55_wi_fi_signal_strength
            name: Signal Wi-Fi
          - entity: binary_sensor.samsung_a55_mobile_data
            name: Data Mobile actives
          - entity: sensor.samsung_a55_network_type
            name: Type de couverture
          - entity: sensor.samsung_a55_ringer_mode
            name: Profil Sonnerie
          - entity: sensor.samsung_a55_last_used_app
            name: Dernière application
          - entity: sensor.samsung_a55_next_alarm
            name: Alarme programmée
