alias: "[Presence] Enable / Disable Persons"
description: >-
  Synchronise l'activation des personnes avec les trackers et met à jour
  group.persons.
triggers:
  - entity_id:
      - device_tracker.a55_de_oscar
      - device_tracker.nmap_tracker_1a_d6_c6_43_dc_ff
      - device_tracker.samsung_a55
    id: Oscar Activation
    trigger: state
    to: home
  - entity_id:
      - input_boolean.oscar_active
    id: Oscar Active
    trigger: state
  - entity_id:
      - input_boolean.nelly_active
    id: Nelly
    trigger: state
  - entity_id:
      - input_boolean.invites_active
    id: Invités
    trigger: state
conditions: []
actions:
  - alias: Activate Oscar
    if:
      - condition: trigger
        id: Oscar Activation
    then:
      - if:
          - condition: state
            entity_id: input_boolean.oscar_active
            state: "off"
        then:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.oscar_active
          - condition: state
            state:
              - not_home
            entity_id: device_tracker.nut_vert_presence
          - action: button.press
            metadata: {}
            target:
              entity_id: button.change_presence_nut_oscar
            data: {}
  - choose:
      - conditions:
          - condition: state
            entity_id: input_boolean.oscar_active
            state: "on"
          - condition: trigger
            id: Oscar Active
        sequence:
          - alias: Add Oscar
            data:
              object_id: persons
              name: Maison
              icon: mdi:home-account
              add_entities:
                - person.oscar
            action: group.set
      - conditions:
          - condition: state
            entity_id: input_boolean.oscar_active
            state: "off"
          - condition: trigger
            id: Oscar Active
        sequence:
          - alias: Remove Oscar
            data:
              object_id: persons
              name: Maison
              icon: mdi:home-account
              remove_entities:
                - person.oscar
            action: group.set
      - conditions:
          - condition: state
            entity_id: input_boolean.nelly_active
            state: "on"
          - condition: trigger
            id: Nelly
        sequence:
          - alias: Add Nelly
            data:
              object_id: persons
              name: Maison
              icon: mdi:home-account
              add_entities:
                - person.nelly
            action: group.set
      - conditions:
          - condition: state
            entity_id: input_boolean.nelly_active
            state: "off"
          - condition: trigger
            id: Nelly
        sequence:
          - alias: Remove Nelly
            data:
              object_id: persons
              name: Maison
              icon: mdi:home-account
              remove_entities:
                - person.nelly
            action: group.set
      - conditions:
          - condition: state
            entity_id: input_boolean.invites_active
            state: "on"
          - condition: trigger
            id: Invités
        sequence:
          - alias: Add Invités
            data:
              object_id: persons
              name: Maison
              icon: mdi:home-account
              add_entities:
                - person.invites
            action: group.set
      - conditions:
          - condition: state
            entity_id: input_boolean.invites_active
            state: "off"
          - condition: trigger
            id: Invités
        sequence:
          - alias: Remove Invités
            data:
              object_id: persons
              name: Maison
              icon: mdi:home-account
              remove_entities:
                - person.invites
            action: group.set
mode: restart
