    show_state: true
    show_icon: true
    entity: sensor.temperature_oscar_humidity
    show_entity_picture: true
    state_content:
      - state
      - last_changed
sections:
  - type: grid
    column_span: 1
    cards:
      - type: heading
        heading: 👤 Oscar
      - type: tile
        grid_options:
          columns: 12
          rows: 1
        entity: person.oscar
        show_entity_picture: true
        state_content:
          - state
          - last_changed
        vertical: false
        features_position: bottom
      - type: tile
        grid_options:
          columns: 12
          rows: 1
        entity: input_boolean.oscar_active
        name: Statut Actif
        state_content:
          - state
          - last_changed
        vertical: false
        features:
          - type: toggle
        features_position: inline
      - type: heading
        heading: ⚖️ Santé
      - show_name: true
        show_icon: false
        show_state: true
        type: custom:hui-glance-card
        entities:
          - entity: sensor.poids_oscar
            name: Poids
          - entity: input_number.poids_oscar_difference
            name: Écart
          - entity: sensor.imc_label_oscar
            name: IMC
          - entity: sensor.imc_oscar
            name: IMC (val)
        state_color: true
        columns: 4
      - type: heading
        heading: 📍 Localisation
      - type: tile
        grid_options:
          columns: 12
          rows: 1
        entity: device_tracker.samsung_a55
        name: Téléphone (GPS)
