alias: "[Lights] Toilette "
description: "Allume/éteint la lumière des toilettes selon détection de mouvement."
trigger:
  - platform: state
    entity_id:
      - binary_sensor.tradfri_motion_sensor_occupancy
    to: "on"
  - platform: state
    entity_id:
      - binary_sensor.tradfri_motion_sensor_occupancy
    to: "off"
    for:
      hours: 0
      minutes: 0
      seconds: 15
    enabled: true
condition:
  - condition: state
    entity_id: binary_sensor.tradfri_motion_sensor_occupancy
    state: "on"
    enabled: false
action:
  - choose:
      - conditions:
          - condition: state
            entity_id: binary_sensor.tradfri_motion_sensor_occupancy
            state: "on"
        sequence:
          - alias: "Turn on toilette "
            service: light.turn_on
            data: {}
            target:
              entity_id: light.livarno_lux_gu10
          - wait_template: "{{ is_state('binary_sensor.tradfri_motion_sensor_occupancy',
              'off') }}"
            continue_on_timeout: false
            enabled: false
          - service: light.turn_on
            metadata: {}
            data:
              flash: long
              effect: finish_effect
            target:
              entity_id: light.livarno_lux_gu10
            enabled: false
          - delay:
              hours: 0
              minutes: 0
              seconds: 5
              milliseconds: 0
            enabled: false
          - alias: Turn off the light
            service: light.turn_off
            data: {}
            target:
              entity_id: light.livarno_lux_gu10
            enabled: false
      - conditions:
          - condition: state
            entity_id: binary_sensor.tradfri_motion_sensor_occupancy
            state: "off"
        sequence:
          - alias: Turn off the light
            service: light.turn_off
            data: {}
            target:
              entity_id: light.livarno_lux_gu10
mode: restart
