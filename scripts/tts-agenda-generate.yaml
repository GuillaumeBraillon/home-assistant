alias: "[TTS] Agenda Générateur IA"
sequence:
  - action: weather.get_forecasts
    metadata: {}
    data:
      type: hourly
    target:
      entity_id: weather.lyon
    response_variable: forecast_lyon
  - variables:
      forecast_summary: >
        {%- set hours_local = [10,12,18] -%} {%- set fc =
        forecast_lyon['weather.lyon'].forecast -%} {%- for hour in hours_local
        -%}
          {%- set key = (now().replace(hour=hour, minute=0, second=0, microsecond=0) - timedelta(hours=1)).isoformat()[:13] -%}
          {%- for item in fc if key in item.datetime -%}
            À {{ hour }}h00 : {{ item.condition|default('?') }}, {{ item.temperature|default('?') }}°C, 
            {%- if item.precipitation|default(0) > 0 %}, pluie {{ item.precipitation }}mm, {%- endif %}, 
            {%- if item.wind_speed|default(0) > 25 %}, vent {{ item.wind_speed }}km/h, {%- endif %}
          {%- endfor -%}
        {%- endfor -%}
      weather_now: >
        {%- set cond = states('weather.lyon') -%} {%- set temp =
        state_attr('weather.lyon','temperature') | float(0) | int -%} {%- set
        rain = state_attr('weather.lyon','precipitation') | float(0) -%} {%- set
        wind = state_attr('weather.lyon','wind_speed') | float(0) -%} Conditions
        actuelles : {{ cond }}, {{ temp }}°C {%- if rain > 0 %}, pluie {{ rain
        }}mm{%- endif %}{%- if wind > 25 %}, vent {{ wind }}km/h{%- endif %}
      agenda_instructions: >-
        Tu produis un résumé vocal naturel des événements. Commence par une
        phrase indiquant la date du jour et la météo actuelle, suivie d'une
        tendance générale pour la journée (évolution du temps, températures
        globales). Ne détaille pas chaque heure, synthétise de manière fluide.

        DONNÉES ENTRANTES: Date et Heure: {{ now().strftime('%A %d %B, il est
        %H:%M') }} Météo Actuelle: {{ weather_now }} Prévisions: {{
        forecast_summary }} Événements: {{ events_holidays }}{{ events_school
        }}{{ events_guillaume }}{{ events_family }}

        Style: - Fluide, naturel, adapté à une synthèse vocale. - Pas de listes
        explicites ou commentaires hors contenu, seulement le texte final. -
        Varie les connecteurs: "ensuite", "plus tard", "à noter…", "et aussi…".
        - Évite les répétitions. - Météo: résumé synthétique et naturel, pas
        d'énumération horaire détaillée. - Médicaments (Metoject, Humira):
        formulation discrète, cite toujours le nom du produit. - Ignore les
        événements de 15 minutes ou moins. - Ignore les événements "Départ
        pour...". - Regroupe ce qui se passe en même temps. - Événements importants: donne l’heure
        (24h), ajoute le lieu seulement si pertinent. - Petits événements: pas
        d’heure, mention courte. - Événements dans plusieurs semaines: utiliser
        un compte à rebours ("dans 15 jours", "dans 3 semaines") sans date
        exacte. - Dates de fin exclusives: si un événement commence un jour (ex:
        19) et finit le lendemain (ex: 20) sans heure précise, le considérer
        comme UNE SEULE JOURNÉE (le 19 uniquement) et ne jamais dire "et le
        lendemain" ou "après-demain".
  - action: ai_task.generate_data
    data:
      task_name: agenda famille Today
      instructions: "{{ agenda_instructions }}"
      entity_id: ai_task.google_ai_task_gemini_2_0_flash
    response_variable: agenda_summary
    enabled: true
  - stop: Return
    response_variable: agenda_summary
mode: queued
icon: mdi:calendar-text
description: " Génère un résumé vocal des événements à partir des calendriers et de la météo via IA."
