alias: "[Notify] Send notifications To Mobiles"
sequence:
  - variables:
      notify_map:
        guillaume: guillaume_device
        nelly: nelly_device
        oscar: oscar_device
        parents: parents_devices
        all: all_devices
      notify_targets: >-
        {% set ns = namespace(values=[]) %}
        {% for raw_target in (target | default('', true) | string).split(';') %}
          {% set cleaned = raw_target | trim | lower %}
          {% set mapped = notify_map.get(cleaned) %}
          {% if mapped and mapped not in ns.values %}
            {% set ns.values = ns.values + [mapped] %}
          {% endif %}
        {% endfor %}
        {{ ns.values }}
      is_clear: "{{ clear | default(false) }}"
      write_notification_log: "{{ write_log | default(true) }}"
      notification_preset: "{{ preset | default('default', true) }}"
      send_mobile_tts: >-
        {{
          notification_preset == 'alarm_tts'
          and mobile_tts_text is defined
          and mobile_tts_text | string | trim != ''
        }}
      preset_data: >-
        {% if notification_preset in ['alarm', 'alarm_tts'] %}
          {{
            {
              'ttl': 0,
              'priority': 'high',
              'importance': 'max',
              'live_update': true,
              'critical_text': '[ALARME]'
            }
          }}
        {% else %}
          {{ {} }}
        {% endif %}
      notify_data: >-
        {% set base = {
          'notification_icon': icon | default('mdi:cellphone', true),
          'channel': channel | default('', true),
          'car_ui': true,
          'sticky': 'true',
          'importance': 'high',
          'persistent': true
        } %}
        {% set preset_values = preset_data | default({}, true) %}
        {% set extra = mobile_data | default({}, true) %}
        {{ base | combine(preset_values, recursive=True) | combine(extra, recursive=True) }}
      notify_tts_data: >-
        {{
          {
            'ttl': 0,
            'priority': 'high',
            'media_stream': 'alarm_stream_max',
            'tts_text': mobile_tts_text,
            'channel': channel | default('alarm_stream', true),
            'car_ui': true
          }
        }}
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ notify_targets | count == 0 }}"
        sequence:
          - data:
              message: "Cible invalide pour notify_send_notifications: {{ target | default('') }}"
              title: "[Notify] Invalid target"
            action: notify.persistent_notification
      - conditions:
          - condition: template
            value_template: "{{ is_clear }}"
        sequence:
          - repeat:
              for_each: "{{ notify_targets }}"
              sequence:
                - data:
                    message: clear_notification
                    data:
                      tag: "{{ clear_tag }}"
                  alias: Clear Notifications On Mobiles
                  action: "notify.{{ repeat.item | slugify }}"
    default:
      - if:
          - condition: template
            value_template: "{{ send_mobile_tts }}"
        then:
          - repeat:
              for_each: "{{ notify_targets }}"
              sequence:
                - data:
                    message: TTS
                    data: "{{ notify_tts_data }}"
                  alias: Send Mobile TTS
                  action: "notify.{{ repeat.item | slugify }}"
          - delay:
              hours: 0
              minutes: 0
              seconds: 3
              milliseconds: 0
      - repeat:
          for_each: "{{ notify_targets }}"
          sequence:
            - data:
                title: "{{ title }}"
                message: "{{ message }}"
                data: "{{ notify_data }}"
              alias: Send Notifications To Mobiles
              action: "notify.{{ repeat.item | slugify }}"
      - if:
          - condition: template
            value_template: "{{ write_notification_log }}"
        then:
          - data:
              message: "{{ message }}"
            alias: Write Notifications
            action: script.notify_write_notifications
mode: queued
icon: mdi:bell-circle-outline
max: 10
description: "Permet d'envoyer des notifications aux mobiles ciblés, avec un message, un titre, une icône et un canal de notification personnalisés."
