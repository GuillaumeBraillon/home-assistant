alias: "[Notify] Send notifications To Mobiles"
sequence:
  - variables:
      notify_map:
        guillaume: guillaume_device
        nelly: nelly_device
        oscar: oscar_device
        parents: parents_devices
        all: all_devices
      notify_targets: >-
        {% set ns = namespace(values=[]) %}
        {% for raw_target in (target | default('', true) | string).split(';') %}
          {% set cleaned = raw_target | trim | lower %}
          {% set mapped = notify_map.get(cleaned) %}
          {% if mapped and mapped not in ns.values %}
            {% set ns.values = ns.values + [mapped] %}
          {% endif %}
        {% endfor %}
        {{ ns.values }}
      is_clear: "{{ clear | default(false) }}"
      notify_data: >-
        {% set base = {
          'notification_icon': icon | default('', true),
          'channel': channel | default('', true),
          'sticky': 'true',
          'importance': 'high',
          'persistent': true
        } %}
        {% set extra = mobile_data | default({}, true) %}
        {{ base | combine(extra, recursive=True) }}
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ is_clear }}"
        sequence:
          - repeat:
              for_each: "{{ notify_targets }}"
              sequence:
                - data:
                    message: clear_notification
                    data:
                      tag: "{{ clear_tag }}"
                  alias: Clear Notifications On Mobiles
                  action: "notify.{{ repeat.item | slugify }}"
    default:
      - repeat:
          for_each: "{{ notify_targets }}"
          sequence:
            - data:
                title: "{{ title }}"
                message: "{{ message }}"
                data: "{{ notify_data }}"
              alias: Send Notifications To Mobiles
              action: "notify.{{ repeat.item | slugify }}"
      - data:
          message: "{{ message}} ({{ notify_targets | join(', ') }})"
          title: "[{{ channel.capitalize() }}] {{ title }}"
        enabled: true
        action: notify.persistent_notification
      - data:
          message: "{{ message }}"
        alias: Write Notifications
        action: script.notify_write_notifications
mode: queued
icon: mdi:bell-circle-outline
max: 10
description: "Permet d'envoyer des notifications aux mobiles ciblés, avec un message, un titre, une icône et un canal de notification personnalisés."
