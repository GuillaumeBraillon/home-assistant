alias: "[TTS] Agenda Générateur IA"
sequence:
  - action: weather.get_forecasts
    metadata: {}
    data:
      type: hourly
    target:
      entity_id: weather.lyon
    response_variable: forecast_lyon
  - variables:
      forecast_summary: >
        {%- set hours_local = [10,12,18] -%} {%- set fc =
        forecast_lyon['weather.lyon'].forecast -%} {%- for hour in hours_local
        -%}
          {%- set key = (now().replace(hour=hour, minute=0, second=0, microsecond=0) - timedelta(hours=1)).isoformat()[:13] -%}
          {%- for item in fc if key in item.datetime -%}
            Prévision {{ hour }}h00 : {{ item.condition|default('?') }}, {{ item.temperature|default('?') }}°C, {%- if item.precipitation|default(0) > 0 %}, pluie {{ item.precipitation }}mm, {%- endif %}
          {%- endfor -%}
        {%- endfor -%}
      weather_now: >
        {%- set cond = states('weather.lyon') -%} {%- set temp =
        state_attr('weather.lyon','temperature') | float(0) -%} {%- set wind =
        state_attr('weather.lyon','wind_speed') | float(0) -%} {%- set rain =
        state_attr('weather.lyon','precipitation') | float(0) -%} Conditions
        maintenant : {{ cond }}, {{ temp|round(0) }}°C{%- if wind > 25 %}, vent
        {{ wind|round(0) }}km/h{%- endif %}{%- if rain > 0 %}, pluie {{ rain
        }}mm{%- endif %}
      agenda_instructions: >-
        Tu produis un résumé vocal naturel des événements. Commence par une
        phrase indiquant la date du jour et une info météo. Pour les prévisions,
        indique l'heure locale, les températures et l'état du ciel. {{
        weather_now }}, {{ forecast_summary }}.

        Événements : {{ events_holidays }}{{ events_school }}{{ events_guillaume }}{{ events_family }}

        Style : fluide, naturel, adapté à une synthèse vocale.
        Pas de listes, pas de commentaires, seulement le texte final.
        Varie les connecteurs : "ensuite", "plus tard", "à noter…", "et aussi…".
        Évite les répétitions.

        Ignore les événements de 15 minutes ou moins.

        Événements importants : Donne l’heure (format 24h), ajoute le lieu seulement si pertinent.
        Petits événements : Pas d’heure, mention courte.
        Événements dans plusieurs semaines : Indique  un compte à rebours ("dans 15 jours", "dans 3 semaines") au lieu de la date exacte. 
        Médicaments (Metoject, Humira) : Formulation discrète : "et il y a le Metoject en fin de journée".

  - action: ai_task.generate_data
    data:
      task_name: agenda famille Today
      instructions: "{{ agenda_instructions }}"
      entity_id: ai_task.google_ai_task_2
    response_variable: agenda_summary
    enabled: true
  - stop: Return
    response_variable: agenda_summary
mode: queued
icon: mdi:calendar-text
description: ""
