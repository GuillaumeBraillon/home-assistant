alias: "[Confort] Fenêtres - Alerte remontée de chaleur"
description: >-
  Alerte si la température remonte durablement (+0.5°C pendant 5 min) au-dessus
  du minimum atteint depuis l'ouverture des fenêtres.
triggers:
  - alias: Tendance hausse (+0.5°C au-dessus du minimum pendant 5 min)
    trigger: template
    value_template: >-
      {{ states('sensor.temperatures_maison') | float(0) | round(1) >=
      states('input_number.temp_min_aeration') | float(0) + 0.5 }}
    for:
      minutes: 5
  - alias: Sécurité - température au-dessus de la température d'ouverture
    trigger: template
    value_template: >-
      {{ states('sensor.temperatures_maison') | float(0) | round(1) >
      states('input_number.temp_reference_aeration') | float(0) }}
    for:
      minutes: 5
conditions:
  - alias: Au moins une fenêtre ouverte
    condition: template
    value_template: "{{ is_state('binary_sensor.fenetres_maison', 'on') }}"
  - condition: state
    entity_id: input_boolean.aeration_active
    state:
      - "on"
actions:
  - variables:
      temp_now: "{{ states('sensor.temperatures_maison') | float(0) | round(1) }}"
      temp_ref: >-
        {{ states('input_number.temp_reference_aeration') | float(0) | round(1)
        }}
      temp_min: "{{ states('input_number.temp_min_aeration') | float(0) | round(1) }}"
      temp_oscar: >-
        {{ states('sensor.temperature_oscar_temperature') | float(0) | round(1)
        }}
      temp_eliott: >-
        {{ states('sensor.temperature_eliott_temperature') | float(0) | round(1)
        }}
      temp_parents: >-
        {{ states('sensor.temperature_parents_temperature') | float(0) |
        round(1) }}
      temp_salon: "{{ states('sensor.temperature_salon') | float(0) | round(1) }}"
      fenetres_ouvertes: >-
        {% set ns = namespace(r=[]) %} {% if
        is_state('binary_sensor.magnet_oscar_contact', 'on') %}
          {% set ns.r = ns.r + ['chambre Oscar'] %}
        {% endif %} {% if is_state('binary_sensor.magnet_eliott_contact', 'on')
        %}
          {% set ns.r = ns.r + ['chambre Eliott'] %}
        {% endif %} {% if is_state('binary_sensor.magnet_parents_contact', 'on')
        %}
          {% set ns.r = ns.r + ['chambre parents'] %}
        {% endif %} {% if
        is_state('binary_sensor.magnet_living_room_left_contact', 'on') %}
          {% set ns.r = ns.r + ['séjour'] %}
        {% endif %} {{ ns.r | join(', ') }}
  - alias: TTS alerte remontée
    action: script.tts_send_tts
    data:
      media_player: media_player.sejour
      message: >-
        Attention.
        {% if temp_now > temp_ref %}
          La température dépasse la valeur d'ouverture. Il faisait {{ temp_ref }} degrés à l'ouverture, et il fait maintenant {{ temp_now }} degrés.
        {% elif temp_now == temp_ref %}
          La température est revenue au niveau de l'ouverture à {{ temp_ref }} degrés.
        {% else %}
          La température remonte dans la maison. Elle était descendue jusqu'à {{ temp_min }} degrés et elle est maintenant à {{ temp_now }} degrés.
        {% endif %}
        Pensez à fermer les fenêtres pour garder le frais.
  - alias: Notification mobile
    action: script.notify_send_notifications
    data:
      target: guillaume
      title: "[Confort] 🌡️ Ferme les fenêtres !"
      message: >-
        {% if temp_now > temp_ref %}<b>⚠️ Dépassement ouverture</b>{% elif temp_now == temp_ref %}<b>📍 Niveau ouverture</b>{% else %}<b>📈 Remontée de température</b>{% endif %}<br>

        Ouverture : <b>{{ temp_ref }}°C</b><br>
        Minimum : <b>{{ temp_min }}°C</b><br>
        Actuel : <b>{{ temp_now }}°C</b><br>

        {% if temp_salon > 0 %}Salon : <b>{{ temp_salon }}°C</b><br>{% endif %}
        {% if temp_parents > 0 %}Parents : <b>{{ temp_parents }}°C</b><br>{% endif %}
        {% if temp_oscar > 0 %}Oscar : <b>{{ temp_oscar }}°C</b><br>{% endif %}
        {% if temp_eliott > 0 %}Eliott : <b>{{ temp_eliott }}°C</b><br>{% endif %}

        Fenêtres : <b>{{ fenetres_ouvertes }}</b>
      icon: mdi:thermometer-chevron-up
      channel: Alert
      preset: default
mode: single
max_exceeded: silent
