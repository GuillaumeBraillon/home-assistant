  - icon: mdi:chart-timeline-variant
    cards:
      - type: heading
        heading: 📊 Historiques
      - type: custom:trend-analysis-card
        header: Température maison
        entity: sensor.temperatures_maison
        preset: 1
        showSettings: false
        showPresets: true
        showDatePickers: false
        showGraph: false
        showPercentage: false
        card_mod:
          style: >-
            ha-card {
              padding: 12px !important;
              box-sizing: border-box !important;
              --trend-primary: var(--primary-color, #6366f1);
              --trend-secondary: var(--secondary-color, #8b5cf6);

              --trend-bg: var(--card-background-color, #ffffff);
              --trend-surface: var(--secondary-background-color, #f8fafc);

              --trend-text-primary: var(--secondary-text-color, #64748b);
              --trend-text-secondary: var(--primary-text-color, #0f172a);

              --trend-border-color: var(--divider-color, transparent);
            }


            ha-card * {
              box-sizing: border-box !important;
            }


            /* Titre sur une seule ligne */

            .card-header, .header-text, [class*="header"] {
              padding: 0 0 8px 0 !important;
              font-size: 14px !important;
              font-weight: 500 !important;
              white-space: nowrap !important;
              overflow: hidden !important;
              text-overflow: ellipsis !important;
            }


            .card-content {
              padding: 12px !important;
              max-width: 100% !important;
            }


            /* Masquer complètement les cartes d'augmentation et de diminution
            */

            stat-card, .stat-card, [class*="stat-card"], 

            div[style*="background-color: var(--trend-increase"], 

            div[style*="background-color: var(--trend-decrease"] {
              display: none !important;
            }


            /* Ajustement et réduction du bloc Variation Nette restant */

            .net-change, [class*="net-change"] {
              padding: 8px !important;
              width: 100% !important;
            }


            .card-content div {
              max-width: 100% !important;
            }


            div[style*="display: flex"] > div,

            .card-content > div > div {
              min-width: 0 !important;
              flex-shrink: 1 !important;
            }


            .card-content h3, [style*="font-size: 14"] {
              font-size: 11px !important;
              font-weight: 600 !important;
              letter-spacing: 0.3px !important;
            }


            .card-content h2, [style*="font-size: 4"], [style*="font-size: 3"] {
              font-size: 22px !important;
              line-height: 1.2 !important;
            }
