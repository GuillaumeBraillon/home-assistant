title: Oscar
icon: mdi:account
path: oscar
type: sections
subview: false
max_columns: 4
dense_section_placement: true
visible:
  - user: c7447f6dbd744a97a1aafc8d1d5d6305
  - user: 2ff2cdef1e4a45709c03849f9cf9420a
  - user: 2e7b70c51f3e453cb5ec7131df051882
badges:
  - type: entity
    show_name: false
    show_state: true
    show_icon: true
    entity: binary_sensor.motion_oscar_occupancy
    show_entity_picture: true
    state_content:
      - state
      - last_changed
  - type: entity
    show_name: false
    show_state: true
    show_icon: true
