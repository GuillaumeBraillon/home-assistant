alias: "[Lights] Chambre Oscar"
description: ''
triggers:
- entity_id:
  - input_boolean.mode_auto_oscar
  - binary_sensor.motion_oscar_occupancy
  from: 'off'
  to: 'on'
  trigger: state
- entity_id:
  - binary_sensor.motion_oscar_occupancy
  id: Indisponible
  to: 'off'
  for:
    hours: 0
    minutes: 30
    seconds: 0
  trigger: state
conditions: []
actions:
- alias: Turn on the light
  if:
  - condition: state
    entity_id: input_boolean.mode_auto_oscar
    state: 'on'
  - condition: state
    entity_id: binary_sensor.motion_oscar_occupancy
    state: 'on'
  then:
  - alias: Turn on the light
    data: {}
    target:
      area_id: chambre_d_oscar
    action: light.turn_on
  - wait_template: "{{ is_state('binary_sensor.motion_oscar_occupancy', 'off') }}"
    continue_on_timeout: false
  - delay:
      hours: 0
      minutes: "{{ states('input_number.now_light_delay_off')|int}}"
      seconds: 0
      milliseconds: 0
    alias: Wait the number of seconds that has been set
- alias: " Turn off the light"
  if:
  - condition: state
    entity_id: input_boolean.mode_auto_oscar
    state: 'on'
  then:
  - alias: Turn off the light
    data: {}
    target:
      area_id: chambre_d_oscar
    action: light.turn_off
- alias: Bureau off no Mouv> 30
  if:
  - condition: trigger
    id: Indisponible
  - condition: state
    entity_id: light.yeelight_mono
    state: unavailable
  then:
  - data: {}
    target:
      entity_id: light.bureau_d_oscar_socket_1
    action: light.turn_off
mode: restart
